<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حملات التبرع بالدم — بنك الدم دمام</title>
<style>
  :root{
    --crimson:#127a3e; --crimson-dark:#0c5e30; --crimson-soft:#e7f4ec;
    --green-bright:#16a34a; --gold:#b8902e; --blood:#b52440;
    --ink:#1f2530; --muted:#6b7280; --line:#e6e8ec; --bg:#f4f5f7;
    --card:#ffffff; --ok:#1f7a4d; --ok-soft:#e6f4ec; --warn:#b06f00;
    --warn-soft:#fff4e0; --danger:#c0392b; --danger-soft:#fdecea;
    --info:#1f5f9e; --info-soft:#e8f1fb; --shadow:0 1px 2px rgba(16,24,40,.06),0 4px 14px rgba(16,24,40,.05);
    --r:14px; --r-sm:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Segoe UI","Tajawal","Noto Sans Arabic",Tahoma,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  a{color:var(--crimson)}

  .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;padding:10px 18px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .mk{width:40px;height:40px;border-radius:11px;background:var(--crimson);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
  .brand .t1{font-weight:800;font-size:15px;white-space:nowrap}
  .brand .t2{color:var(--muted);font-size:12px;white-space:nowrap}
  .topbar .spacer{flex:1}
  .top-tabs{display:flex;gap:6px}
  .top-tab{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:13px;font-weight:700;color:var(--ink)}
  .top-tab:hover{background:#f5f6f8}
  .top-tab.active{background:var(--crimson-soft);color:var(--crimson);border-color:transparent}
  .sync-dot{width:9px;height:9px;border-radius:50%;background:#c8ccd2;flex:none}
  .sync-dot.on{background:var(--ok)}

  .main{max-width:1080px;margin:0 auto;padding:22px 20px 60px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .page-head h2{margin:0;font-size:21px}
  .page-head p{margin:2px 0 0;color:var(--muted);font-size:13px}

  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .kpi .lbl{color:var(--muted);font-size:13px;font-weight:600}
  .kpi .val{font-size:28px;font-weight:800;margin-top:6px;letter-spacing:-.5px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .panel-h h3{margin:0;font-size:15px}
  .panel-h .hint{color:var(--muted);font-size:12px;font-weight:500}
  .panel-b{padding:16px}

  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .form-grid label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .form-grid input,.form-grid select,.form-grid textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;outline:none}
  .form-grid input:focus,.form-grid select:focus{border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-soft)}
  .form-grid .full{grid-column:1/-1}
  .req:after{content:" *";color:var(--danger)}

  .btn{border:none;border-radius:var(--r-sm);padding:11px 16px;font-weight:700;font-size:15px;background:var(--crimson);color:#fff;transition:filter .15s,transform .02s}
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:translateY(1px)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)} .btn.ghost:hover{background:#f7f8fa}
  .btn.soft{background:var(--crimson-soft);color:var(--crimson)}
  .btn.danger{background:var(--danger)}
  .btn.sm{padding:7px 11px;font-size:13px;font-weight:600}
  .btn:disabled{opacity:.55;cursor:not-allowed}

  .tbl-wrap{overflow:auto;border-radius:var(--r-sm)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:10px 12px;text-align:start;border-bottom:1px solid var(--line);white-space:nowrap}
  th{background:#fafbfc;color:var(--muted);font-weight:700;font-size:12.5px}
  tbody tr:hover{background:#fafbfc}
  .tag{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
  .tag.ok{background:var(--ok-soft);color:var(--ok)}
  .tag.warn{background:var(--warn-soft);color:var(--warn)}
  .tag.danger{background:var(--danger-soft);color:var(--danger)}
  .tag.info{background:var(--info-soft);color:var(--info)}
  .tag.mut{background:#eef0f3;color:var(--muted)}
  .row-actions{display:flex;gap:6px;flex-wrap:wrap}

  .logo-prev{width:64px;height:64px;border-radius:12px;border:1px solid var(--line);object-fit:contain;background:#fff;display:none}

  /* ===== modal ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:440px;width:100%;padding:24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal h3{margin:0 0 10px}
  .modal .qr-box{display:flex;justify-content:center;margin:14px 0}
  .modal .lnk{font-size:12px;direction:ltr;word-break:break-all;background:#f4f5f7;border-radius:8px;padding:8px;margin:8px 0;font-family:monospace}

  /* ===== donor page ===== */
  .donor-wrap{min-height:100vh;background:radial-gradient(1200px 600px at 70% -10%,#b52440 0%,var(--crimson) 35%,var(--crimson-dark) 100%);display:flex;align-items:center;justify-content:center;padding:20px}
  .donor-card{background:#fff;width:100%;max-width:430px;border-radius:20px;padding:28px 24px;box-shadow:0 20px 50px rgba(0,0,0,.25);text-align:center}
  .donor-card .org-logo{max-width:110px;max-height:110px;object-fit:contain;margin:0 auto 6px;display:block}
  .donor-card .mark{width:64px;height:64px;border-radius:16px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:var(--crimson-soft);font-size:32px}
  .donor-card h1{font-size:20px;margin:0 0 2px}
  .donor-card .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .bt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0 18px}
  .bt-btn{border:2px solid var(--line);background:#fff;border-radius:14px;padding:13px 4px;font-size:19px;font-weight:800;color:var(--ink);direction:ltr}
  .bt-btn.sel{border-color:var(--blood);background:#fdecef;color:var(--blood)}
  .donate-btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:18px;font-weight:800;background:var(--blood);color:#fff}
  .donate-btn:disabled{opacity:.5}
  .thanks-emoji{font-size:56px;margin:6px 0}
  .thanks-phrase{background:var(--crimson-soft);color:var(--crimson);border-radius:12px;padding:14px;font-weight:700;margin:14px 0;font-size:15px}
  .thanks-num{font-size:15px;color:var(--muted)}
  .thanks-num b{color:var(--blood);font-size:22px}

  /* ===== display screen (ألوان تناسب كيس الدم) — كل المحتوى يظهر في شاشة واحدة بدون تمرير ===== */
  .screen{--chip:clamp(48px,7.6vh,86px);height:100vh;height:100dvh;background:radial-gradient(1400px 800px at 70% -10%,#d90429 0%,#800f2f 45%,#3d0814 100%);color:#fff;display:flex;flex-direction:column;padding:1.6vh 3vw;overflow:hidden;position:relative;box-sizing:border-box}
  .scr-head{display:flex;align-items:center;gap:18px;flex-wrap:wrap;flex:none}
  .scr-logo{height:9vh;max-height:90px;min-height:52px;object-fit:contain;background:#fff;border-radius:14px;padding:6px}
  .scr-title h1{margin:0;font-size:clamp(18px,3vh,38px);font-weight:800;line-height:1.2}
  .scr-title p{margin:2px 0 0;font-size:clamp(11px,1.7vh,17px);opacity:.85}
  .scr-days{display:flex;gap:8px;margin-inline-start:auto;flex-wrap:wrap}
  .day-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:12px;padding:2px 10px;text-align:center;font-size:clamp(10px,1.3vh,13px);height:var(--chip);min-width:var(--chip);display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none}
  .day-chip b{display:block;font-size:clamp(13px,1.9vh,19px)}
  .day-chip.now{background:#fff;color:#800f2f}
  .scr-body{flex:1 1 auto;display:flex;align-items:center;gap:2.4vw;margin-top:.8vh;min-height:0}
  .bag-area{flex:none;height:100%;display:flex;align-items:center;gap:2vw;max-width:44%}
  .bag-svg{height:100%;max-height:100%;width:auto;filter:drop-shadow(0 12px 30px rgba(0,0,0,.4))}
  #blood-g{transition:transform 1.5s cubic-bezier(.22,1,.36,1)}
  .bag-side .pct{font-size:clamp(30px,7vh,84px);font-weight:800;line-height:1;text-shadow:0 4px 18px rgba(0,0,0,.35)}
  .bag-side .of{font-size:clamp(12px,2vh,20px);opacity:.9;margin-top:6px}
  .bag-side .of b{font-size:clamp(16px,2.8vh,30px)}
  .drop-fall{animation:dropFall 1.15s cubic-bezier(.45,0,.9,.55) forwards}
  @keyframes dropFall{0%{transform:translateY(0) scale(.85);opacity:0}12%{opacity:1}80%{opacity:1}100%{transform:translateY(258px) scale(1.02);opacity:0}}
  .scr-types{flex:1;height:100%;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:1vh 1.2vw;min-width:0}
  .type-tile{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:4px 8px;text-align:center;backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0}
  .type-tile .tl{font-size:clamp(13px,2.6vh,26px);font-weight:800;direction:ltr}
  .type-tile .tc{font-size:clamp(18px,4vh,42px);font-weight:800;line-height:1.15}
  .type-tile .ts{font-size:clamp(9px,1.1vh,12px);opacity:.75}
  .scr-foot{display:flex;align-items:center;gap:2vw;margin-top:.8vh;flex:none}
  .phrase-box{flex:1;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:1.2vh 2vw;font-size:clamp(13px,2.3vh,24px);font-weight:700;text-align:center;transition:opacity .8s}
  .phrase-box.fade{opacity:0}
  .scr-qr{flex:none;background:#fff;border-radius:14px;padding:8px;text-align:center;color:var(--ink)}
  .scr-qr .cap{font-size:10px;font-weight:700;margin-top:3px}
  .pulse{animation:pulse .9s ease}
  @keyframes pulse{0%{transform:scale(1)}35%{transform:scale(1.06)}100%{transform:scale(1)}}
  .scr-ended{position:absolute;inset:0;background:rgba(61,8,20,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center;padding:20px}
  .scr-ended h2{font-size:clamp(22px,4.5vh,48px);margin:0 0 8px}
  .scr-credit{text-align:center;font-size:clamp(13px,2.2vh,24px);font-weight:800;opacity:.95;margin-top:.6vh;text-shadow:0 2px 8px rgba(0,0,0,.3);flex:none}
  .credit{text-align:center;color:var(--ink);font-size:16px;font-weight:800;padding:20px 0 6px}
  .logo-bar{display:flex;align-items:center;justify-content:space-between;gap:2vw;flex:none}
  .logo-bar .lg{flex:1;display:flex;justify-content:center}
  .logo-bar .lg:first-child{justify-content:flex-start}
  .logo-bar .lg:last-child{justify-content:flex-end}
  /* شعارات المنظمين بنفس مقاس شعارات الرعاة ومقاس مربع الأيام */
  .logo-bar img{height:var(--chip);max-width:26vw;object-fit:contain;filter:drop-shadow(0 2px 10px rgba(0,0,0,.35))}
  .sponsor-bar{display:flex;align-items:center;justify-content:space-around;width:100%;gap:1.5vw;padding:2px 0;flex:none}
  .sponsor-bar img{height:var(--chip);max-width:15vw;object-fit:contain;filter:drop-shadow(0 2px 10px rgba(0,0,0,.35))}
  /* أداة تحديد مكان الاسم على الشهادة */
  .cert-pick{position:relative;max-width:440px;cursor:crosshair;display:none}
  .cert-pick img{width:100%;display:block;border:1px solid var(--line);border-radius:8px}
  .cert-pick .marker{position:absolute;transform:translate(-50%,-100%);pointer-events:none;font-size:13px;font-weight:800;color:#c0392b;text-shadow:0 0 4px #fff,0 0 8px #fff;white-space:nowrap}
  .scr-times{text-align:center;font-size:clamp(16px,3.2vh,34px);font-weight:700;line-height:1.25;margin-top:.4vh;flex:none}
  .scr-tools{position:absolute;bottom:14px;inset-inline-start:16px;z-index:15;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .scr-lang{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:20px;padding:6px 16px;font-weight:700;font-size:14px;cursor:pointer}
  .scr-lang:hover{background:rgba(255,255,255,.28)}
  .scr-theme{display:flex;gap:7px;align-items:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:5px 12px}
  .sw{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.75);cursor:pointer;padding:0}
  .sw.sel{box-shadow:0 0 0 3px #fff}
  .sw-custom{width:26px;height:26px;border:none;background:none;cursor:pointer;padding:0}
  .day-chip.now{color:var(--scr-deep,#800f2f)}
  .wave-x{animation:waveMove 4.5s linear infinite}
  @keyframes waveMove{from{transform:translateX(0)}to{transform:translateX(80px)}}
  .bub{animation:bubbleRise 4.2s ease-in infinite}
  @keyframes bubbleRise{0%{transform:translateY(0);opacity:.55}80%{opacity:.4}100%{transform:translateY(-60px);opacity:0}}
  @media(max-width:760px){
    .scr-body{flex-direction:column;gap:2vh}
    .bag-svg{height:32vh}
    .scr-types{grid-template-columns:repeat(4,1fr);width:100%}
    .scr-foot{flex-direction:column}
    .scr-qr{display:none}
  }

  .toast{position:fixed;bottom:18px;inset-inline-start:50%;transform:translateX(50%);background:var(--ink);color:#fff;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:600;z-index:80;display:none}
  .toast.err{background:var(--danger)}
  .empty{color:var(--muted);text-align:center;padding:26px;font-size:14px}
  .center-load{min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--muted)}
</style>
</head>
<body>
<div id="view"><div class="center-load">جارِ التحميل…</div></div>
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal-box"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ================= إعدادات عامة ================= */
const FB_CFG={apiKey:"AIzaSyBLs1q9ryZZYI5Br9yBi7sSXk-92HVklRI",authDomain:"bloodbank-dammam.firebaseapp.com",projectId:"bloodbank-dammam",storageBucket:"bloodbank-dammam.firebasestorage.app",messagingSenderId:"165465917721",appId:"1:165465917721:web:2989e02513f51e6c101d88"};
/* البيانات تُخزّن داخل مجموعة inventory_sync المسموح بها في قواعد المشروع، بمعرّفات تبدأ بـ dc_c_ */
const SYNC_COL="inventory_sync", PFX="dc_c_", META_DOC="inventory_sync/dc_meta";
const BT=[{k:"Opos",l:"O+"},{k:"Oneg",l:"O−"},{k:"Apos",l:"A+"},{k:"Aneg",l:"A−"},
          {k:"Bpos",l:"B+"},{k:"Bneg",l:"B−"},{k:"ABpos",l:"AB+"},{k:"ABneg",l:"AB−"}];
const ORD=["الأول","الثاني","الثالث","الرابع","الخامس","السادس","السابع","الثامن","التاسع","العاشر","الحادي عشر","الثاني عشر","الثالث عشر","الرابع عشر"];
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(m,cls){const t=$("#toast");t.textContent=m;t.className="toast"+(cls?" "+cls:"");t.style.display="block";clearTimeout(t._h);t._h=setTimeout(()=>t.style.display="none",3200);}
function dayOrd(n){return "اليوم "+(ORD[n-1]||("رقم "+n));}
function dkey(d){return "d"+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");}
function dkeyOf(startISO,i){const d=new Date(startISO+"T00:00:00");d.setDate(d.getDate()+i);return dkey(d);}
function todayIdx(c){const s=new Date(c.startDate+"T00:00:00"),t=new Date();t.setHours(0,0,0,0);return Math.floor((t-s)/86400000)+1;}
function fmtDate(iso){const d=new Date(iso+"T00:00:00");return d.toLocaleDateString("ar-SA-u-nu-latn",{day:"numeric",month:"long",year:"numeric"});}

/* ================= Firebase ================= */
let db=null,fbReady=null;
function loadJS(u){return new Promise((ok,er)=>{const s=document.createElement("script");s.src=u;s.onload=ok;s.onerror=er;document.head.appendChild(s);});}
function ensureFB(){
  if(fbReady)return fbReady;
  fbReady=(async()=>{
    await loadJS("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
    await loadJS("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js");
    const app=(firebase.apps&&firebase.apps.length)?firebase.app():firebase.initializeApp(FB_CFG);
    db=app.firestore();
    try{await db.enablePersistence({synchronizeTabs:true});}catch(e){}
    const dot=$("#sync-dot"); if(dot)dot.classList.add("on");
    return db;
  })();
  return fbReady;
}
const inc=n=>firebase.firestore.FieldValue.increment(n);
const cDoc=id=>db.collection(SYNC_COL).doc(id);
function cQuery(){const FP=firebase.firestore.FieldPath.documentId();return db.collection(SYNC_COL).where(FP,">=",PFX).where(FP,"<",PFX+"");}
function newId(){return PFX+Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function sortRows(rows){return rows.sort((a,b)=>((b.createdAt&&b.createdAt.seconds)||0)-((a.createdAt&&a.createdAt.seconds)||0));}

/* ================= العبارات التحفيزية (5250+) ================= */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let PHRASES={};
function phrases(lang){
  lang=lang||"ar";
  if(PHRASES[lang])return PHRASES[lang];
  if(lang==="en")return PHRASES.en=buildPool(
    ["Your donation today","A single drop of your blood","Your generosity","Your noble gesture","A few minutes of your time","One bag of your blood","Your decision to donate","Your stand today","Your kindness","Your generous initiative","Your presence at this campaign","Your humane gesture","Your giving spirit","Your courage","Your great resolve","Your helping hand","Your heartbeat","Your sincere giving","The blood bag you gave","Your support for the blood bank","Your response to patients' call","Your volunteering today","Your care for the sick","Your commitment to giving"],

function buildPool(A,B,C,S){
  const sep=/[a-z]/i.test(C[0])?", ":"، ";
  const out=S.slice();
  for(const a of A)for(const b of B)for(const c of C)out.push(a+" "+b+sep+c);
  const rnd=mulberry32(20260706);
  for(let i=out.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[out[i],out[j]]=[out[j],out[i]];}
  return out;
}

/* قصّ الهوامش الشفافة حول الشعار حتى يملأ مساحته على الشاشة */
function trimCanvas(cv){
  try{
    const g=cv.getContext("2d"),{data,width,height}=g.getImageData(0,0,cv.width,cv.height);
    let minX=width,minY=height,maxX=-1,maxY=-1;
    for(let y=0;y<height;y++)for(let x=0;x<width;x++){
      if(data[(y*width+x)*4+3]>10){if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;}
    }
    if(maxX<0||(minX===0&&minY===0&&maxX===width-1&&maxY===height-1))return cv;
    const pad=Math.round(Math.max(maxX-minX,maxY-minY)*.03);
    minX=Math.max(0,minX-pad);minY=Math.max(0,minY-pad);
    maxX=Math.min(width-1,maxX+pad);maxY=Math.min(height-1,maxY+pad);
    const w=maxX-minX+1,h=maxY-minY+1;
    const out=document.createElement("canvas");out.width=w;out.height=h;
    out.getContext("2d").drawImage(cv,minX,minY,w,h,0,0,w,h);
    return out;
  }catch(e){return cv;}
}
/* ضغط شعار PNG مع الحفاظ على الشفافية وحد أقصى للحجم يناسب سقف وثيقة Firestore (1MB) */
async function compressLogo(f,maxDim,maxBytes){
  const img=await fileToImg(f);
  const base=Math.min(1,1200/Math.max(img.width,img.height));
  const c0=document.createElement("canvas");c0.width=Math.max(1,Math.round(img.width*base));c0.height=Math.max(1,Math.round(img.height*base));
  c0.getContext("2d").drawImage(img,0,0,c0.width,c0.height);
  const src=trimCanvas(c0);
  for(const dim of [maxDim,Math.round(maxDim*.7),Math.round(maxDim*.5)]){
    const sc=Math.min(1,dim/Math.max(src.width,src.height));
    const cv=document.createElement("canvas");cv.width=Math.max(1,Math.round(src.width*sc));cv.height=Math.max(1,Math.round(src.height*sc));
    cv.getContext("2d").drawImage(src,0,0,cv.width,cv.height);
    const d=cv.toDataURL("image/png");
    if(d.length<=maxBytes)return d;
  }
  throw new Error("big");
}

/* تحويل تصميم الشهادة (PDF أو TIF أو صورة) إلى صورة عالية الدقة تُخزن مع الحملة */
async function certFileToImage(f){
  let cv;
  if(f.type==="application/pdf"){
    await loadJS("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const pdf=await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise;
    const page=await pdf.getPage(1);
    const vp0=page.getViewport({scale:1}),scale=1600/vp0.width,vp=page.getViewport({scale});
    cv=document.createElement("canvas");cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
  }else if(f.type==="image/tiff"||/\.tiff?$/i.test(f.name)){
    // ملفات TIF (تصاميم الطباعة) — المتصفح لا يفكها، نستخدم UTIF
    await loadJS("https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.min.js");
    const buf=await f.arrayBuffer(),ifds=UTIF.decode(buf);
    UTIF.decodeImage(buf,ifds[0]);
    const w=ifds[0].width,h=ifds[0].height;
    const c0=document.createElement("canvas");c0.width=w;c0.height=h;
    c0.getContext("2d").putImageData(new ImageData(new Uint8ClampedArray(UTIF.toRGBA8(ifds[0])),w,h),0,0);
    const sc=Math.min(1,1600/Math.max(w,h));
    cv=document.createElement("canvas");cv.width=Math.round(w*sc);cv.height=Math.round(h*sc);
    cv.getContext("2d").drawImage(c0,0,0,cv.width,cv.height);
  }else{
    const img=await fileToImg(f);
    const sc=Math.min(1,1600/Math.max(img.width,img.height));
    cv=document.createElement("canvas");cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
  }
  let d=cv.toDataURL("image/jpeg",.85);
  if(d.length>400000)d=cv.toDataURL("image/jpeg",.7);
  if(d.length>450000)throw new Error("big");
  return d;
}

/* إصدار شهادة الشكر PDF باسم المتبرع فوق التصميم المرفق */
async function makeCert(){
  const inp=$("#cert-name"),nm=inp?inp.value.trim():"";
  if(!nm)return toast("اكتب اسمك أولاً","err");
  if(!curCamp||!curCamp.cert)return;
  const btn=event&&event.target;if(btn)btn.disabled=true;
  try{
    await loadJS("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
    const langSel=document.querySelector('input[name="cert-lang"]:checked');
    const design=(langSel&&langSel.value==="en"&&curCamp.cert.imgEn)?curCamp.cert.imgEn:curCamp.cert.img;
    const img=new Image();
    await new Promise((ok,er)=>{img.onload=ok;img.onerror=er;img.src=design;});
    const cv=document.createElement("canvas");cv.width=img.width;cv.height=img.height;
    const ctx=cv.getContext("2d");ctx.drawImage(img,0,0);
    const posMap={top:.38,mid:.55,low:.72};
    const nx=(curCamp.cert.nx!=null)?curCamp.cert.nx:.5;
    const ny=(curCamp.cert.ny!=null)?curCamp.cert.ny:(posMap[curCamp.cert.pos]||.55);
    ctx.textAlign="center";ctx.direction="rtl";
    ctx.font="bold "+Math.round(cv.height*.055)+'px "Segoe UI","Tajawal",Tahoma,Arial';
    ctx.fillStyle="#1f2530";
    ctx.shadowColor="rgba(255,255,255,.85)";ctx.shadowBlur=10;
    ctx.fillText(nm,cv.width*nx,cv.height*ny);
    const pdf=new jspdf.jsPDF({orientation:cv.width>=cv.height?"landscape":"portrait",unit:"px",format:[cv.width,cv.height],hotfixes:["px_scaling"]});
    pdf.addImage(cv.toDataURL("image/jpeg",.9),"JPEG",0,0,cv.width,cv.height);
    pdf.save("شهادة-شكر-"+nm+".pdf");
    toast("صدرت الشهادة ✓");
  }catch(e){toast("تعذر إصدار الشهادة — أعد المحاولة","err");}
  if(btn)btn.disabled=false;
}

function hexRGB(h){h=String(h).replace("#","");if(h.length===3)h=h.split("").map(c=>c+c).join("");return [parseInt(h.slice(0,2),16)||0,parseInt(h.slice(2,4),16)||0,parseInt(h.slice(4,6),16)||0];}
function mixC(h,t,toWhite,alpha){
  const a=hexRGB(h),b=toWhite?[255,255,255]:[0,0,0];
  const v=a.map((x,i)=>Math.round(x+(b[i]-x)*t));
  return alpha!=null?`rgba(${v[0]},${v[1]},${v[2]},${alpha})`:`rgb(${v[0]},${v[1]},${v[2]})`;
}

async function renderScreen(id){

  $("#view").innerHTML=`<div class="screen" id="scr"><div class="center-load" style="min-height:80vh;color:#fff">جارِ التحميل…</div></div>`;
  const cacheKey="dc_cache_"+id;
  let built=false,lastTotal=null;
  const build=c=>{
    window._scrC=c;
    localStorage.setItem(cacheKey,JSON.stringify(c));
    if(!built){drawScreen(id,c);built=true;}
    updateScreen(c,lastTotal);
    if(lastTotal!==null&&(c.total||0)>lastTotal)celebrate((c.total||0)-lastTotal);
    lastTotal=c.total||0;
  };
  try{
    await ensureFB();
    unsub=cDoc(id).onSnapshot(s=>{if(s.exists)build(s.data());},()=>{
      const cached=localStorage.getItem(cacheKey);if(cached&&!built)build(JSON.parse(cached));
    });
  }catch(e){
    const cached=localStorage.getItem(cacheKey);
    if(cached)build(JSON.parse(cached));
    else $("#scr").innerHTML=`<div class="center-load" style="color:#fff">تحقق من الاتصال بالإنترنت</div>`;
  }
  timers.push(setInterval(()=>{ // تبديل العبارة كل 10 دقائق (فحص كل 20 ثانية)
    const el=$("#phrase");if(!el)return;
    const p=phraseFor(window._scrC,scrLang);

  },20000));
  timers.push(setInterval(()=>{if(window._scrC&&window._scrC.status==="active")spawnDrops(1);},8000)); // قطرة هادئة دورية
}

function updateScreen(c,prevTotal){

function animNum(el,from,to,suf){
  if(!el)return;const t0=performance.now(),dur=900;
  const step=t=>{const k=Math.min(1,(t-t0)/dur);el.textContent=Math.round(from+(to-from)*(1-Math.pow(1-k,3)))+suf;if(k<1)requestAnimationFrame(step);};
  requestAnimationFrame(step);
}
/* قطرات دم واقعية تسقط من أنبوب الكيس إلى داخله */
function spawnDrops(n){
  const box=$("#drops");if(!box)return;
  const NS="http://www.w3.org/2000/svg";
  for(let i=0;i<n;i++){
    const g=document.createElementNS(NS,"g");
    g.setAttribute("transform","translate("+(156+Math.random()*24).toFixed(1)+",112)");
    const p=document.createElementNS(NS,"path");
    p.setAttribute("d","M0,-13 C5,-5 8,0 8,5 A8,8 0 1,1 -8,5 C-8,0 -5,-5 0,-13 Z");
    p.setAttribute("fill","url(#dropGrad)");

    p.setAttribute("class","drop-fall");
    p.style.animationDelay=(i*0.35+Math.random()*.2).toFixed(2)+"s";
    g.appendChild(p);box.appendChild(g);
    setTimeout(()=>g.remove(),2200+i*350);
  }
}
function celebrate(n){
  const w=$("#bag-area");if(w){w.classList.remove("pulse");void w.offsetWidth;w.classList.add("pulse");}

      sel.innerHTML=`<option value="">كل الحملات</option>`+names.map(n=>`<option ${n===cur?"selected":""}>${esc(n)}</option>`).join("");
      drawStats();
    },()=>{$("#st-box").innerHTML=`<div class="empty">تعذر الاتصال</div>`;});
  }catch(e){$("#st-box").innerHTML=`<div class="empty">تحقق من الاتصال بالإنترنت</div>`;}
}
function drawStats(){
  let rows=window._srows||[];
  const f=$("#st-name").value;if(f)rows=rows.filter(r=>r.name===f);
  if(!rows.length)return $("#st-box").innerHTML=`<div class="empty">لا توجد بيانات</div>`;
  const byYear={};
  rows.forEach(r=>{const y=(r.startDate||"").slice(0,4)||"غير محدد";(byYear[y]=byYear[y]||[]).push(r);});
  $("#st-box").innerHTML=Object.keys(byYear).sort().reverse().map(y=>{
    const list=byYear[y],tot=list.reduce((s,r)=>s+(r.total||0),0),goal=list.reduce((s,r)=>s+(r.goal||0),0);
    const tc={};BT.forEach(b=>tc[b.k]=list.reduce((s,r)=>s+((r.counts||{})[b.k]||0),0));
    return `<div class="panel"><div class="panel-h"><h3>📅 سنة ${y}</h3>
      <div class="hint">${list.length} حملة · ${tot} متبرعاً من هدف ${goal} (${goal?Math.round(tot/goal*100):0}%)</div></div>
      <div class="panel-b">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          ${BT.map(b=>`<span class="tag info" style="direction:ltr">${b.l}: ${tc[b.k]}</span>`).join("")}
        </div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>الحملة</th><th>المدينة</th><th>البداية</th><th>الأيام</th><th style="text-align:center">الهدف</th><th style="text-align:center">المتبرعون</th><th style="text-align:center">التحقيق</th><th>الحالة</th><th></th></tr></thead>
          <tbody>${list.map(r=>{const p=r.goal?Math.round((r.total||0)/r.goal*100):0;
            return `<tr><td><b>${esc(r.name)}</b></td><td>${esc(r.city)}</td><td>${fmtDate(r.startDate)}</td><td>${r.days}</td>
            <td style="text-align:center">${r.goal}</td><td style="text-align:center"><b>${r.total||0}</b></td>
            <td style="text-align:center"><span class="tag ${p>=100?"ok":p>=50?"info":"warn"}">${p}%</span></td>
            <td>${r.status==="active"?`<span class="tag ok">نشطة</span>`:`<span class="tag mut">مؤرشفة</span>`}</td>
            <td><div class="row-actions"><button class="btn sm soft" onclick="showDays('${r.id}')">📅 إحصائية الأيام</button>
            <button class="btn sm ghost" onclick="exportCampPDF('${r.id}')">🖨️ PDF</button></div></td></tr>`;}).join("")}
          </tbody></table></div>
      </div></div>`;
  }).join("");
}

/* إحصائية كل يوم مستقلة ثم مجموع كل الأيام */
function showDays(id){
  const r=(window._srows||[]).find(x=>x.id===id);if(!r)return;
  const sum={total:0};BT.forEach(b=>sum[b.k]=0);
  let rowsH="";
  for(let i=1;i<=r.days;i++){
    const dk=dkeyOf(r.startDate,i-1),dd=(r.daily||{})[dk]||{};
    sum.total+=dd.total||0;BT.forEach(b=>sum[b.k]+=dd[b.k]||0);
    const dt=new Date(r.startDate+"T00:00:00");dt.setDate(dt.getDate()+i-1);
    rowsH+=`<tr><td>${dayOrd(i)}<div style="font-size:11px;color:var(--muted)">${dt.toLocaleDateString("ar-SA-u-nu-latn",{day:"numeric",month:"short"})}</div></td>`
      +BT.map(b=>`<td style="text-align:center">${dd[b.k]||0}</td>`).join("")
      +`<td style="text-align:center"><b>${dd.total||0}</b></td></tr>`;
  }
  rowsH+=`<tr style="background:var(--crimson-soft)"><td><b>مجموع كل الأيام</b></td>`
    +BT.map(b=>`<td style="text-align:center"><b>${sum[b.k]}</b></td>`).join("")
    +`<td style="text-align:center"><b style="color:var(--crimson)">${sum.total}</b></td></tr>`;
  const box=$("#modal-box");box.style.maxWidth="780px";
  box.innerHTML=`<h3>${esc(r.name)} — إحصائية الأيام</h3>
    <p style="color:var(--muted);font-size:13px;margin:0 0 10px">كل يوم مستقل بفصائله ثم المجموع الكلي</p>
    <div class="tbl-wrap" style="max-height:60vh;overflow:auto"><table style="font-size:13px">
      <thead><tr><th>اليوم</th>${BT.map(b=>`<th style="text-align:center;direction:ltr">${b.l}</th>`).join("")}<th style="text-align:center">المجموع</th></tr></thead>
      <tbody>${rowsH}</tbody></table></div>
    <div style="margin-top:12px"><button class="btn sm ghost" onclick="closeModal()">إغلاق</button></div>`;
  $("#modal-bg").classList.add("open");
}

/* ===== تصدير التقارير PDF — كل تقرير في صفحة A4 واحدة (رسم عربي عبر canvas ثم jsPDF) ===== */
async function ensureJsPDF(){await loadJS("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");}
const RPT_FONT='"Segoe UI","Tajawal","Noto Sans Arabic",Tahoma,Arial';
function rptCanvas(){
  const cv=document.createElement("canvas");cv.width=1240;cv.height=1754;
  const x=cv.getContext("2d");x.fillStyle="#fff";x.fillRect(0,0,1240,1754);
  x.direction="rtl";x.textAlign="center";x.textBaseline="middle";
  return [cv,x];
}
function rptHeader(x,title,sub){
  x.fillStyle="#127a3e";x.fillRect(0,0,1240,175);
  x.fillStyle="#fff";x.font="bold 46px "+RPT_FONT;x.fillText(title,620,70);
  x.font="bold 32px "+RPT_FONT;x.fillText(sub,620,130);
}
function rptFooter(x){
  x.fillStyle="#6b7280";x.font="24px "+RPT_FONT;
  const d=new Date().toLocaleDateString("ar-SA-u-nu-latn",{day:"numeric",month:"long",year:"numeric"});
  x.fillText("بنك الدم — دمام · فكرة وإعداد: حسن العاقول · صدر التقرير في "+d,620,1710);
}
function rptSave(cv,fname){
  const pdf=new jspdf.jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  pdf.addImage(cv.toDataURL("image/jpeg",.92),"JPEG",0,0,210,297);
  pdf.save(fname);
}
function rptBox(x,bx,by,bw,bh,label,val,accent){
  x.fillStyle=accent?"#e7f4ec":"#f4f5f7";
  x.beginPath();x.roundRect(bx,by,bw,bh,16);x.fill();
  x.fillStyle="#6b7280";x.font="26px "+RPT_FONT;x.fillText(label,bx+bw/2,by+38);
  x.fillStyle=accent?"#127a3e":"#1f2530";x.font="bold 52px "+RPT_FONT;x.fillText(String(val),bx+bw/2,by+95);
}
/* جدول RTL عام: يبدأ من اليمين، widths مصفوفة عرض الأعمدة */
function rptTable(x,y0,widths,header,rows,rowH,highlightLast){
  const totalW=widths.reduce((a,b)=>a+b,0),x0=620+totalW/2; // يمين الجدول (موسّط)
  const colRight=[];let acc=0;
  widths.forEach(w=>{colRight.push(x0-acc);acc+=w;});
  const drawRow=(cells,y,bold,bg)=>{
    if(bg){x.fillStyle=bg;x.fillRect(x0-totalW,y-rowH/2,totalW,rowH);}
    x.fillStyle=bold?"#127a3e":"#1f2530";
    x.font=(bold?"bold ":"")+Math.min(26,rowH*.5)+"px "+RPT_FONT;
    cells.forEach((cTxt,i)=>x.fillText(String(cTxt),colRight[i]-widths[i]/2,y));
  };
  x.fillStyle="#f0f2f5";x.fillRect(x0-totalW,y0-rowH/2,totalW,rowH);
  x.fillStyle="#6b7280";x.font="bold "+Math.min(24,rowH*.45)+"px "+RPT_FONT;
  header.forEach((h,i)=>x.fillText(h,colRight[i]-widths[i]/2,y0));
  rows.forEach((r,ri)=>{
    const y=y0+rowH*(ri+1);
    drawRow(r,y,highlightLast&&ri===rows.length-1,highlightLast&&ri===rows.length-1?"#e7f4ec":(ri%2?"#fafbfc":null));
  });
  x.strokeStyle="#d5d9df";x.lineWidth=1.5;
  for(let i=0;i<=rows.length+1;i++){const y=y0-rowH/2+rowH*i;x.beginPath();x.moveTo(x0-totalW,y);x.lineTo(x0,y);x.stroke();}
  x.beginPath();x.moveTo(x0,y0-rowH/2);x.lineTo(x0,y0-rowH/2+rowH*(rows.length+1));x.stroke();
  x.beginPath();x.moveTo(x0-totalW,y0-rowH/2);x.lineTo(x0-totalW,y0-rowH/2+rowH*(rows.length+1));x.stroke();
  return y0+rowH*(rows.length+1);
}
const trunc=(s,n)=>{s=String(s||"");return s.length>n?s.slice(0,n-1)+"…":s;};
/* تقرير حملة واحدة في صفحة */
async function exportCampPDF(id){
  const r=(window._srows||window._rows||[]).find(c=>c.id===id);if(!r)return;
  try{
    await ensureJsPDF();
    const [cv,x]=rptCanvas();
    rptHeader(x,"تقرير حملة التبرع بالدم",r.name+" — "+r.city);
    x.fillStyle="#1f2530";x.font="27px "+RPT_FONT;
    const tl=r.timeFrom?("بداية الحملة: "+r.timeFrom+"    نهاية الحملة: "+(r.timeTo||"")):(r.times||"");
    x.fillText("تاريخ البداية: "+fmtDate(r.startDate)+"    المدة: "+r.days+(r.days>1?" أيام":" يوم"),620,225);
    x.fillText(tl+(r.org?"    الجهة المنظمة: "+r.org:""),620,268);
    const pct=(r.goal?Math.round((r.total||0)/r.goal*100):0);
    rptBox(x,90,310,330,130,"الهدف",r.goal,false);
    rptBox(x,455,310,330,130,"إجمالي المتبرعين",r.total||0,true);
    rptBox(x,820,310,330,130,"نسبة التحقيق",pct+"%",pct>=100);
    x.fillStyle="#1f2530";x.font="bold 30px "+RPT_FONT;x.fillText("إحصائية الأيام والفصائل",620,520);
    const widths=[140,150, 82,82,82,82,82,82,82,82, 120];
    const header=["اليوم","التاريخ",...BT.map(b=>b.l),"المجموع"];
    const sum={total:0};BT.forEach(b=>sum[b.k]=0);
    const rows=[];
    for(let i=1;i<=r.days;i++){
      const dk=dkeyOf(r.startDate,i-1),dd=(r.daily||{})[dk]||{};
      sum.total+=dd.total||0;BT.forEach(b=>sum[b.k]+=dd[b.k]||0);
      const dt=new Date(r.startDate+"T00:00:00");dt.setDate(dt.getDate()+i-1);
      rows.push([dayOrd(i).replace("اليوم ",""),dt.toLocaleDateString("ar-SA-u-nu-latn",{day:"numeric",month:"short"}),...BT.map(b=>dd[b.k]||0),dd.total||0]);
    }
    rows.push(["المجموع","",...BT.map(b=>sum[b.k]),sum.total]);
    const rowH=Math.min(56,Math.max(38,980/(rows.length+1)));
    rptTable(x,575,widths,header,rows,rowH,true);
    rptFooter(x);
    rptSave(cv,"تقرير-"+r.name+".pdf");
    toast("صدر تقرير الحملة ✓");
  }catch(e){toast("تعذر إصدار التقرير","err");}
}
/* التقرير الشامل (حسب الفلتر الحالي) في صفحة واحدة */
async function exportAllPDF(){
  let rows=window._srows||[];
  const f=$("#st-name")?$("#st-name").value:"";if(f)rows=rows.filter(r=>r.name===f);
  if(!rows.length)return toast("لا توجد بيانات للتصدير","err");
  try{
    await ensureJsPDF();
    const [cv,x]=rptCanvas();
    rptHeader(x,"التقرير الشامل لحملات التبرع بالدم",(f?("الحملة: "+f):"كل الحملات")+" · "+rows.length+" حملة");
    const tot=rows.reduce((s,r)=>s+(r.total||0),0),goal=rows.reduce((s,r)=>s+(r.goal||0),0);
    rptBox(x,90,215,330,130,"مجموع الأهداف",goal,false);
    rptBox(x,455,215,330,130,"إجمالي المتبرعين",tot,true);
    rptBox(x,820,215,330,130,"نسبة التحقيق",(goal?Math.round(tot/goal*100):0)+"%",false);
    const tc={};BT.forEach(b=>tc[b.k]=rows.reduce((s,r)=>s+((r.counts||{})[b.k]||0),0));
    x.fillStyle="#1f2530";x.font="bold 28px "+RPT_FONT;
    x.fillText("مجموع الفصائل:   "+BT.map(b=>b.l+": "+tc[b.k]).join("    "),620,415);
    const widths=[290,140,170,90,110,140,120];
    const header=["الحملة","المدينة","التاريخ","الأيام","الهدف","المتبرعون","النسبة"];
    const list=rows.map(r=>[trunc(r.name,20),trunc(r.city,10),fmtDate(r.startDate),r.days,r.goal,r.total||0,(r.goal?Math.round((r.total||0)/r.goal*100):0)+"%"]);
    list.push(["الإجمالي","","","",goal,tot,(goal?Math.round(tot/goal*100):0)+"%"]);
    const rowH=Math.min(54,Math.max(32,1160/(list.length+1)));
    rptTable(x,480,widths,header,list,rowH,true);
    rptFooter(x);
    rptSave(cv,f?("تقرير-"+f+"-شامل.pdf"):"التقرير-الشامل-لكل-الحملات.pdf");
    toast("صدر التقرير الشامل ✓");
  }catch(e){toast("تعذر إصدار التقرير","err");}
}
