 {ic:"📦",cls:"g-purple",
  ar:{t:"إدارة المنتجات والقائمة المعتمدة",s:["افتح «إدارة المنتجات» لتعريف الأصناف وتعديلها وحذفها (الكود، الاسم، الشركة، التصنيف، الوحدة، الحد الأدنى، ورقم نشرة الاستخدام IFU).","في لوحة «القائمة المعتمدة» تظهر كل الأصناف المعتمدة مجمّعة حسب المجموعة.","لإضافة صنف جديد للقائمة المعتمدة اضغط «+ إضافة صنف» ← اختر المجموعة وأدخل الاسم ونوع العبوة والوحدة والكمية لكل عبوة.","تظهر الأصناف المُضافة بلون مميّز مع زر حذف (×)، وتصبح متاحة فوراً ضمن «إضافة من القائمة المعتمدة» في شاشة الاستقبال."]},
  en:{t:"Products & approved list",s:["Open “Product management” to define, edit, and delete items (code, name, manufacturer, classification, unit, minimum, and IFU reference).","The “Approved list” panel shows all approved items grouped by group.","To add a new item to the approved list, click “+ Add item” ← choose the group and enter the name, pack type, unit, and quantity per pack.","Added items appear in a distinct color with a delete (×) button and become available immediately under “Add from the approved list” on the Receive screen."]}},
 {ic:"📤",cls:"g-cyan",
  ar:{t:"الصرف من المخزون",s:["افتح «صرف وإخراج» ثم اختر المجموعة (مثل Grifols/IH 1000/الملاريا) لتصفية قائمة الأصناف — تماماً كما في الاستقبال — ثم اختر الصنف من القائمة المُصفّاة؛ يظهر المتاح والتشغيلات حسب الأقرب انتهاءً (FIFO). التشغيلات المحجوزة (تحت فحص QC أو مستدعاة) لا تظهر للصرف.","أدخل الكمية المطلوبة واختر المختبر المستلِم. للأصناف التي لها تحويل كت/عبوة (مثل كواشف Alinity — 1 كت = 500 اختبار، أو REVEOS BAG — 1 علبة = 18 كيس)، يظهر تنبيه أصفر وحقل إضافي «عدد الكتات/العلب» — اكتب فيه عدد الكتات أو العلب المصروفة (مثلاً 2) وسيُحسب لك تلقائياً إجمالي الكمية بوحدة الاختبار/الكيس ويُملأ حقل الكمية المصروفة تلقائياً؛ يمكنك أيضاً تعديل الكمية يدوياً بعد ذلك إن لزم — الخصم من الرصيد يتم دائماً بوحدة الاختبار/الكيس وليس بعدد الكتات.","تظهر نافذة تأكيد بتوزيع الصرف وتنبيهات: وجود تشغيلة أقدم/منتهية الصلاحية، أو فتح تشغيلة جديدة لأول مرة. أكّد فتُسجَّل الحركة.","الكواشف والكروت ضمن قائمة Lot-to-Lot: يُطبع تلقائياً «نموذج التحقق من التشغيلة» فقط عند فتح تشغيلة جديدة لأول مرة (وليس مع كل عملية صرف من نفس التشغيلة الجارية) — حسب سياسة المختبرات. يشمل النموذج التاريخ (إنجليزي)، الطريقة (Method)، جدول مقارنة اللوت القديم والجديد (Positive/Negative/Reactive/Non-Reactive وفصائل الدم A/B/AB/O موجب وسالب)، والتشغيلة المصروفة والقسم المستلِم، وحقول VERSION (معبأة تلقائياً بـ 1) وDOCUMENT No. (معبأ تلقائياً بـ DCBB-073-V1 حسب متطلب الجودة QC) قابلة للتعديل عند الحاجة، وحقل اسم «Done by» فارغة تُعبّأ يدوياً (لا تُملأ تلقائياً باسم المستخدم المسجّل دخوله)، إضافة لحقول اسم Q.M Coordinator وB.B Medical Director."]},
  en:{t:"Dispensing (FIFO)",s:["Open “Dispense”, then pick the group (e.g. Grifols/IH 1000/Malaria) to filter the item list — same as on Receive — then select the item from the filtered list; available stock and earliest-expiring lots (FIFO) appear. Quarantined lots (QC pending or recalled) are hidden from dispensing.","Enter the required quantity and choose the receiving lab. For items with a kit/pack conversion (e.g. Alinity reagents — 1 kit = 500 tests, or REVEOS BAG — 1 box = 18 bags), a yellow reminder appears along with an extra “Number of kits/boxes” field — enter how many kits or boxes were dispensed (e.g. 2) and the total in test/bag units is calculated automatically and filled into the quantity field; you can still edit the quantity manually afterward if needed — stock is always deducted in test/bag units, never in kit count.","A confirmation dialog shows the allocation with alerts: an older/expired lot, or opening a new lot for the first time. Confirm to log the movement.","Reagents & cards on the Lot-to-Lot list: a “Lot-to-Lot Verification Form” prints automatically only when a new lot is opened for the first time (not on every dispense of an already-in-use lot) — per standard lab policy. It includes the date (English), Method, an old-vs-new lot comparison table (Positive/Negative/Reactive/Non-Reactive plus A/B/AB/O positive & negative blood groups), the issued lot, receiving department, VERSION / DOCUMENT No. fields pre-filled (1 / DCBB-073-V1 per QC requirement, still editable), and a blank “Done by” name field to fill in manually (not auto-filled with the logged-in user), alongside Q.M Coordinator / B.B Medical Director name fields."]}},
 {ic:"🔄",cls:"g-green",
  ar:{t:"إعادة الطلب والتموين",s:["افتح «إعادة الطلب» — يجمع تلقائياً الأصناف التي تحتاج طلب شراء.","تظهر بثلاث حالات: «نفذ» (صفر متاح)، «تحت/قريب الحد الأدنى»، و«قرب الانتهاء» (تشغيلة قاربت انتهاء صلاحيتها — لطلب بديل قبل انتهائها).","تظهر الكمية المقترحة وآخر مورّد. اضغط «تحديد كمطلوب» لتتبّع ما طُلب، أو «تصدير طلب الشراء» للطباعة/Excel."]},
  en:{t:"Reorder & replenishment",s:["Open “Reorder” — it automatically gathers items that need a purchase order.","Three statuses: “Out” (zero available), “Below/Approaching minimum”, and “Near expiry” (a lot close to expiring — order a replacement before it expires).","Suggested quantity and last supplier are shown. Click “Mark as ordered” to track, or “Export purchase request” to print/Excel."]}},
 {ic:"🔎",cls:"g-pink",
  ar:{t:"التتبّع والاستدعاء والإتلاف",s:["«تتبع التشغيلة»: ابحث برقم التشغيلة (Lot) لعرض سجلها الكامل — إجمالي المستلم/المصروف/المُتلَف/المتبقي، وأين ومتى صُرفت — للاستدعاء وسلامة المريض.","الاستدعاء 🚩 (من جدول التشغيلات): يحجز المتبقي تلقائياً، ويأخذ السبب ومرجع NCMDR، ويعرض أثر الاستدعاء.","الإتلاف 🚮: لإخراج المنتهي/المرفوض مع توثيق السبب والمسؤول والتاريخ. تقريرا الإتلاف والاستدعاء متاحان في «التقارير»."]},
  en:{t:"Trace, recall & disposal",s:["“Lot trace”: search by lot number for the full record — total received/dispensed/disposed/remaining, and where & when dispensed — for recalls and patient safety.","Recall 🚩 (from the lots table): auto-quarantines the remaining stock, takes the reason and NCMDR reference, and shows the recall impact.","Disposal 🚮: remove expired/rejected stock documenting reason, responsible person, and date. Disposal & recall reports are in “Reports”."]}},
 {ic:"🌡️",cls:"g-blue",
  ar:{t:"سجل درجات الحرارة (سلسلة التبريد)",s:["افتح «سجل الحرارة» وعرّف وحدات التخزين (ثلاجة/فريزر) مع المدى المسموح (أدنى/أعلى °م).","سجّل القراءة اليومية لكل وحدة؛ يُكتشف أي تجاوز للمدى تلقائياً ويظهر تنبيه «تجاوز!».","يبقى السجل كاملاً للمراجعة ويمكن تصديره Excel — متطلب التوزيع الجيد (GDP) والاعتماد."]},
  en:{t:"Temperature log (cold chain)",s:["Open “Temperature log” and define storage units (fridge/freezer) with the allowed range (min/max °C).","Log the daily reading per unit; any out-of-range value is auto-flagged with an “Excursion!” alert.","The full log is kept for review and can be exported to Excel — a GDP / accreditation requirement."]}},
 {ic:"🏷️",cls:"g-cyan",
  ar:{t:"الباركود: طباعة ومسح",s:["اطبع الملصقات: «طباعة الباركود» ← اختر صنفاً أو أدخل الكود، عدّل الاسم/التشغيلة/الانتهاء (Code 39) وعدد النسخ. يعمل دون اتصال.","للمسح السريع: اضغط زر «📷 مسح» بالأعلى — امسح بماسح USB/بلوتوث أو بالكاميرا (حيث تُدعم) أو أدخل الكود يدوياً ثم Enter.","بعد المسح ينتقل مباشرة للصنف مع أزرار سريعة: عرض في المخزون، استقبال، أو صرف."]},
  en:{t:"Barcode: print & scan",s:["Print labels: “Barcode printing” ← pick an item or enter the code, adjust name/lot/expiry (Code 39) and copies. Works offline.","Quick scan: press the “📷 Scan” button at the top — scan with a USB/Bluetooth reader or the camera (where supported), or type the code and press Enter.","After scanning it jumps straight to the item with quick actions: view in inventory, receive, or dispense."]}},
 {ic:"📊",cls:"g-pink",
  ar:{t:"التقارير والتصدير",s:["افتح «التقارير» لرؤية التشغيلات المنتهية/القريبة والأكثر استهلاكاً، وتقرير الفترة وتقرير الموظفين.","صدّر أي تقرير بصيغة Excel/CSV: المخزون، الحركات، الانتهاء، الاستهلاك، استهلاك المختبرات، الإتلاف، الاستدعاء، الفترة، الموظفين.","استخدم «طباعة الصفحة» لطباعة تقرير جاهز."]},
  en:{t:"Reports & export",s:["Open “Reports” to see expired/near-expiry lots, most-consumed items, plus the period and employee reports.","Export any report as Excel/CSV: inventory, movements, expiry, consumption, lab usage, disposal, recall, period, employees.","Use “Print page” to print a ready report."]}},
 {ic:"⚙️",cls:"g-orange",
  ar:{t:"الإعدادات والمزامنة بين الأجهزة",s:["من «الإعدادات» غيّر كلمة مرورك وأيام التنبيه قبل الانتهاء، وأضف مختبرات خاصة تظهر في الاستقبال والصرف.","أضف «الموردين المعتمدين» (اسم/تواصل/تسجيل SFDA/الحالة) — يظهرون في حقل المورّد بالاستقبال.","للمدير: النسخ الاحتياطي والاستعادة، و«تصفير المخزون» (يحتفظ بالأصناف والقوائم ويصفّر الكميات، مع تنزيل نسخة احتياطية أولاً).","لتفعيل المزامنة بين الأجهزة: أنشئ مشروع Firebase وفعّل Firestore، والصق إعداد firebaseConfig مع معرّف مساحة موحّد على كل الأجهزة."]},
  en:{t:"Settings & multi-device sync",s:["In “Settings” change your password and alert days, and add custom labs shown in receive/dispense.","Add “Approved suppliers” (name/contact/SFDA reg/status) — they appear in the supplier field on Receiving.","For admins: backup & restore, and “Zero inventory” (keeps items and lists, resets quantities, downloading a backup first).","To enable multi-device sync: create a Firebase project, enable Firestore, and paste the firebaseConfig with one shared Workspace ID on every device."]}},
 {ic:"👥",cls:"g-pink",
  ar:{t:"إدارة المستخدمين (للمدير العام)",s:["من «إدارة المستخدمين» (تظهر للمدير العام فقط) أضف حساباً جديداً باسم مستخدم وكلمة مرور وصلاحية.","عند الإضافة، اختر من قائمة الصفحات (لوحة التحكم، استقبال المحاليل، المخزون، حركة المخزون، إعادة الطلب...) الصفحات التي يسمح لهذا الحساب برؤيتها فقط.","الحساب الأساسي للنظام هو «مدير عام» بصلاحية كاملة على كل الصفحات وإدارة المستخدمين، ولا يمكن تقييده أو حذفه.","لأي حساب «مستخدم» أو «مدير» يمكن للمدير العام لاحقاً تعديل الصفحات المتاحة له بزر 🛡️، أو تغيير اسمه (✏️) أو كلمة مروره (🔑) أو حذفه — واسم المستخدم يجب أن يكون فريداً."]},
  en:{t:"User management (super admin)",s:["In “User management” (visible to the super admin only) add a new account with a username, password, and role.","When adding an account, choose from the page list (Dashboard, Receive solutions, Inventory, Stock movement, Reorder…) which pages that account is allowed to see.","The system's primary account is “Super Admin”, with full access to every page and to user management — it can't be restricted or deleted.","For any “User” or “Admin” account, the super admin can later edit its available pages (🛡️ button), rename it (✏️), change its password (🔑), or delete it — usernames must stay unique."]}},
];
function openGuide(){
  const body=`<p class="guide-intro">${esc(t("guide_intro"))}</p>`+GUIDE.map((g,i)=>{const G=LANG==="en"?g.en:g.ar;
    return `<div class="gcard ${g.cls}" id="gc-${i}"><div class="gcard-h" onclick="App.guideToggle(${i})"><div class="gcard-ic">${g.ic}</div><div class="gcard-t"><b><span class="gcard-num">${i+1}</span>${esc(G.t)}</b><span>${G.s.length} ${t("steps_word")}</span></div><div class="gcard-ch">‹</div></div><div class="gcard-b"><ol>${G.s.map(x=>`<li>${esc(x)}</li>`).join("")}</ol></div></div>`;
  }).join("");
  modal(t("guide_title"),body);
}
function guideToggle(i){ const c=$("gc-"+i); if(c) c.classList.toggle("open"); }

/* expose */
return {init,login,logout,go,toggleSide,toggleLang,closeModal,
  onCodeType,expHint,doReceive,catGroup,catItem,catKits,
  dispenseInfo,doDispense,dispenseKits,dispenseGroupChange,
  renderBarcode,bcFromItem,pickBarcode,printBarcode,scan,scanGo,
  toggleLots,editItem,delItem,addLot,adjustLot,delLot,disposeLot,releaseQC,recallLot,
  exportCSV,setRepRange,setRepEmp,repPreset,saveSettings,addLab,delLab,backup,restore,reseed,wipe,zeroStock,toggleOrder,doTrace,
  addTempUnit,delTempUnit,logTemp,addSupplier,delSupplier,
  addUser,setRole,editPerms,resetUserPass,renameUser,delUser,
  addProduct,addCatItem,delCatItem,importTemplate,importFile,importRows,toggleCollapse,
  connectSync,disconnectSync,unlockSync,openGuide,guideToggle};
})();
window.App = App;
App.init();
</script>
