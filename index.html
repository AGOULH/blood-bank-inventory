<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Hasan Alagoul - حسن العاقول">
<title>إدارة مخزون المحاليل الطبية</title>
<style>
  :root{
    --crimson:#127a3e; --crimson-dark:#0c5e30; --crimson-soft:#e7f4ec;
    --green-bright:#16a34a; --gold:#b8902e;
    --sidebar:#0a2c1a; --sidebar-line:rgba(255,255,255,.08); --sidebar-active:rgba(255,255,255,.10);
    --ink:#1f2530; --muted:#6b7280; --line:#e6e8ec; --bg:#f4f5f7;
    --card:#ffffff; --ok:#1f7a4d; --ok-soft:#e6f4ec; --warn:#b06f00;
    --warn-soft:#fff4e0; --yellow:#f4c430; --danger:#c0392b; --danger-soft:#fdecea;
    --info:#1f5f9e; --info-soft:#e8f1fb; --shadow:0 1px 2px rgba(16,24,40,.06),0 4px 14px rgba(16,24,40,.05);
    --shadow-md:0 4px 14px rgba(16,24,40,.1),0 1.5px 4px rgba(16,24,40,.07);
    --shadow-lg:0 14px 34px rgba(16,24,40,.18),0 3px 10px rgba(16,24,40,.1);
    --ease:cubic-bezier(.2,.7,.3,1);
    --r:14px; --r-sm:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Segoe UI","Tajawal","Noto Sans Arabic",Tahoma,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  a{color:var(--crimson)}

  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 70% -10%,#b52440 0%,var(--crimson) 35%,var(--crimson-dark) 100%);padding:20px;z-index:50}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .login-card{background:#fff;width:100%;max-width:380px;border-radius:18px;padding:30px 26px;box-shadow:0 20px 50px rgba(0,0,0,.25);text-align:center;position:relative;animation:fadeUp .4s var(--ease)}
  .lang-pill{position:absolute;top:14px;inset-inline-end:14px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--ink)}
  .login-mark{width:62px;height:62px;border-radius:16px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;background:var(--crimson-soft);color:var(--crimson);font-size:30px}
  .login-card h1{font-size:19px;margin:0 0 4px}
  .login-card p{color:var(--muted);font-size:13px;margin:0 0 22px}
  .field{text-align:start;margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-soft)}
  .btn{border:none;border-radius:var(--r-sm);padding:11px 16px;font-weight:700;font-size:15px;background:linear-gradient(135deg,var(--green-bright) 0%,var(--crimson) 55%,var(--crimson-dark) 100%);color:#fff;box-shadow:0 3px 10px rgba(18,122,62,.3);transition:filter .18s var(--ease),transform .15s var(--ease),box-shadow .18s var(--ease)}
  .btn:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 20px rgba(18,122,62,.4)} .btn:active{transform:translateY(0);box-shadow:0 2px 6px rgba(18,122,62,.25)}
  .btn.full{width:100%}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none} .btn.ghost:hover{background:#f7f8fa;box-shadow:0 4px 12px rgba(16,24,40,.08)}
  .btn.soft{background:var(--crimson-soft);color:var(--crimson);box-shadow:none} .btn.soft:hover{box-shadow:0 4px 12px rgba(18,122,62,.15)}
  .btn.danger{background:var(--danger);box-shadow:0 2px 10px rgba(192,57,43,.22)} .btn.danger:hover{box-shadow:0 6px 16px rgba(192,57,43,.3)}
  .btn.sm{padding:7px 11px;font-size:13px;font-weight:600}
  .login-err{color:var(--danger);font-size:13px;min-height:18px;margin-top:6px}

  #app{display:none;min-height:100vh}
  .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;padding:14px 18px;min-height:140px;box-sizing:border-box}
  .top-logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;pointer-events:none}
  .top-logo img{height:110px;width:auto;max-width:280px;object-fit:contain}
  .topbar .spacer{flex:1}
  .date-chip{font-size:12px;color:var(--muted);text-align:end;line-height:1.35}
  .date-chip b{color:var(--ink);font-weight:700}
  .lang-btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 11px;font-size:13px;font-weight:700;color:var(--ink);transition:background .15s var(--ease)}
  .lang-btn:hover{background:#f5f6f8}

  .layout{display:flex;align-items:flex-start}
  .side{width:235px;flex:none;padding:16px 12px;position:sticky;top:141px;height:calc(100vh - 141px);overflow:auto;border-inline-end:1px solid var(--line);background:#fff}
  .nav-group{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;padding:10px 10px 6px;text-transform:uppercase}
  .nav-item{display:flex;align-items:center;gap:10px;width:100%;text-align:start;border:none;background:none;padding:10px 11px;border-radius:10px;color:var(--ink);font-size:14px;font-weight:600;margin-bottom:2px;transition:background .15s var(--ease),color .15s var(--ease)}
  .nav-item .ic{width:22px;text-align:center;font-size:16px;flex:none}
  .nav-item:hover{background:#f5f6f8}
  .nav-item.active{background:var(--crimson-soft);color:var(--crimson)}
  .nav-item.active .ic{color:var(--crimson)}

  .main{flex:1;min-width:0;padding:22px 26px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .page-head h2{margin:0;font-size:21px}
  .page-head p{margin:2px 0 0;color:var(--muted);font-size:13px}
  .head-actions{display:flex;gap:8px;flex-wrap:wrap}

  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-md);transition:transform .2s var(--ease),box-shadow .2s var(--ease);position:relative;overflow:hidden}
  .kpi:before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--green-bright),var(--crimson-dark))}
  .kpi:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
  .kpi .lbl{color:var(--muted);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
  .kpi .val{font-size:28px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.danger{background:var(--danger)} .dot.info{background:var(--info)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-md);margin-bottom:16px;transition:box-shadow .2s var(--ease);position:relative;overflow:hidden}
  .panel:before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green-bright),var(--crimson-dark))}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .panel-h h3{margin:0;font-size:15px}
  .panel-h .hint{color:var(--muted);font-size:12px;font-weight:500}
  .panel-b{padding:16px}
  .two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  @media(max-width:1000px){.two-col{grid-template-columns:1fr}}

  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .form-grid label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .form-grid input,.form-grid select,.form-grid textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;outline:none}
  .form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-soft)}
  .form-grid .full{grid-column:1/-1}
  .req:after{content:" *";color:var(--danger)}

  .tbl-wrap{overflow:auto;border-radius:var(--r-sm)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:10px 12px;text-align:start;border-bottom:1px solid var(--line);white-space:nowrap}
  th{background:#fafbfc;color:var(--muted);font-weight:700;font-size:12.5px;position:sticky;top:0}
  tbody tr{transition:background .15s var(--ease)}
  tbody tr:hover{background:#fafbfc}
  td.num,th.num{text-align:center}
  .tag{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
  .tag.ok{background:var(--ok-soft);color:var(--ok)}
  .tag.warn{background:var(--warn-soft);color:var(--warn)}
  .tag.danger{background:var(--danger-soft);color:var(--danger)}
  .tag.info{background:var(--info-soft);color:var(--info)}
  .tag.mut{background:#eef0f3;color:var(--muted)}
  .mono{font-family:monospace}
  .row-actions{display:flex;gap:6px;justify-content:flex-start}
  .icon-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 8px;font-size:13px;color:var(--ink);transition:background .15s var(--ease),transform .15s var(--ease),box-shadow .15s var(--ease)}
  .icon-btn:hover{background:#f5f6f8;transform:translateY(-1px);box-shadow:0 3px 8px rgba(16,24,40,.1)}
  .icon-btn.danger{color:var(--danger);border-color:#f3c9c4}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;padding:10px;padding-inline-start:38px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;outline:none;transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
  .search input:focus{border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-soft)}
  .search .si{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;background:#fff}
  .seg button{border:none;background:none;padding:9px 13px;font-size:13px;font-weight:600;color:var(--muted);transition:background .15s var(--ease),color .15s var(--ease)}
  .seg button:hover:not(.active){background:#f5f6f8}
  .seg button.active{background:var(--crimson);color:#fff}

  .empty{text-align:center;padding:42px 20px;color:var(--muted)}
  .empty .em-ic{font-size:36px;opacity:.5}
  .empty h4{margin:10px 0 4px;color:var(--ink)}

  .alert-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:9px}
  .alert-item .a-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;font-size:16px}
  .alert-item .a-tx{flex:1;min-width:0}
  .alert-item .a-tx b{display:block;font-size:14px}
  .alert-item .a-tx span{font-size:12px;color:var(--muted)}

  .bar-row{display:grid;grid-template-columns:130px 1fr 46px;align-items:center;gap:10px;margin-bottom:9px}
  .bar-row .bl{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{background:#eef0f3;border-radius:8px;height:22px;overflow:hidden}
  .bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--crimson),#c93350);min-width:2px;transition:width .5s}
  .bar-val{font-size:13px;font-weight:700;text-align:end}
  .donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .legend{display:flex;flex-direction:column;gap:7px;font-size:13px}
  .legend .li{display:flex;align-items:center;gap:8px}

  .label-card{border:1px dashed var(--line);border-radius:var(--r-sm);padding:18px;text-align:center;background:#fff}
  .label-card .lc-name{font-weight:800;font-size:16px;margin-bottom:2px}
  .label-card .lc-meta{font-size:12px;color:var(--muted);margin-bottom:10px}
  .label-card svg{max-width:100%}
  .label-card .lc-code{font-family:monospace;letter-spacing:2px;margin-top:6px;font-size:14px}

  @keyframes bgIn{from{opacity:0}to{opacity:1}}
  .modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:18px;overflow-y:auto;animation:bgIn .18s var(--ease)}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:92vh;overflow:auto;animation:fadeUp .22s var(--ease)}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
  .modal-h h3{margin:0;font-size:17px}
  .modal-h .x{border:none;background:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
  .modal-b{padding:18px}
  .modal-f{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-start}

  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:300;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.ok{background:var(--ok)} #toast.err{background:var(--danger)}

  .help-box{background:var(--info-soft);border:1px solid #cfe0f3;border-radius:var(--r-sm);padding:12px 14px;font-size:13px;color:#284b6e}
  .help-box code{background:#fff;padding:1px 6px;border-radius:5px;border:1px solid #cfe0f3}
  .muted{color:var(--muted)}
  .stat-line{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-top:4px}
  hr.sep{border:none;border-top:1px solid var(--line);margin:16px 0}
  .menu-toggle{display:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 10px;font-size:17px}

  @media(max-width:760px){
    .topbar{min-height:85px;padding:10px 14px}
    .top-logo img{height:64px;max-width:160px}
    .side{position:fixed;inset-inline-start:0;top:86px;transition:.2s;box-shadow:-6px 0 24px rgba(0,0,0,.12);z-index:40}
    .main{padding:16px 14px}
    .menu-toggle{display:inline-flex!important}
    .date-chip{display:none}
    [dir=rtl] .side{transform:translateX(110%)} [dir=rtl] .side.open{transform:translateX(0)}
    [dir=ltr] .side{transform:translateX(-110%)} [dir=ltr] .side.open{transform:translateX(0)}
  }
  @media print{
    body{background:#fff}
    .topbar,.side,.head-actions,.no-print,.toolbar,.panel-h .btn{display:none!important}
    .main{padding:0}
    .panel{box-shadow:none;border:none;margin:0}
    .label-card{border:1px solid #000;page-break-inside:avoid}
    th{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .tag{border:1px solid #999;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .print-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  }

  /* === Ministry of Health identity === */
  .side{background:var(--sidebar);border-inline-end:1px solid var(--sidebar-line)}
  .nav-group{color:rgba(255,255,255,.45)}
  .nav-item{color:rgba(255,255,255,.85)}
  .nav-item .ic{color:rgba(255,255,255,.7)}
  .nav-item:hover{background:rgba(255,255,255,.07)}
  .nav-item.active{background:var(--sidebar-active);color:#fff}
  .nav-item.active .ic{color:var(--green-bright)}
  .bar-fill{background:linear-gradient(90deg,var(--crimson-dark),var(--green-bright))}
  #login{background:radial-gradient(1200px 600px at 75% -10%,#1f9a55 0%,#0e7a3f 38%,#075a2e 100%)}
  .login-logo{display:flex;justify-content:center;margin-bottom:16px}
  .moh-logo-img{height:150px;width:auto;max-width:270px;object-fit:contain}
  .moh-lock{display:inline-flex;align-items:center;gap:11px}
  .moh-emblem{width:46px;height:46px;flex:none} .moh-emblem svg{width:100%;height:100%}
  .moh-words{display:flex;flex-direction:column;line-height:1.12;text-align:start}
  .moh-words b{font-size:17px;font-weight:800;color:var(--crimson-dark)}
  .moh-words i{font-size:10.5px;font-style:normal;color:var(--crimson);font-weight:600}
  .login-card h1{color:var(--crimson-dark)}
  .login-sys{color:var(--crimson);font-weight:700;font-size:14px;margin:2px 0 0}
  .login-min{color:var(--muted);font-size:12.5px;margin:8px 0 0}
  .kpi{display:flex;align-items:center;gap:14px}
  .kpi-body{flex:1;min-width:0}
  .kpi-ic{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:23px;color:#fff;flex:none}
  .kpi-ic.greend{background:linear-gradient(135deg,var(--crimson),var(--crimson-dark))} .kpi-ic.green{background:linear-gradient(135deg,#22c55e,var(--green-bright))}
  .kpi-ic.yellow{background:linear-gradient(135deg,#f9d65c,var(--yellow));color:#5a4500} .kpi-ic.red{background:linear-gradient(135deg,#d95445,var(--danger))} .kpi-ic.blue{background:linear-gradient(135deg,#3a7bc0,var(--info))}
  .kpi-ic.flat{background:none;width:48px;height:48px}
  .kpi-ic.flat svg{width:46px;height:46px;display:block}
  .fab-guide{position:fixed;bottom:20px;left:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--crimson),var(--crimson-dark));color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 24px rgba(0,0,0,.28);z-index:35;transition:transform .2s var(--ease),box-shadow .2s var(--ease),filter .2s var(--ease)}
  .fab-guide:hover{filter:brightness(1.08);transform:translateY(-2px) scale(1.05);box-shadow:0 12px 30px rgba(0,0,0,.32)}
  .fab-guide svg{width:26px;height:26px}
  .guide-intro{color:var(--muted);font-size:13.5px;margin:0 0 14px}
  .gcard{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:box-shadow .2s var(--ease)}
  .gcard:hover{box-shadow:var(--shadow)}
  .gcard-h{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;transition:background .15s var(--ease)}
  .gcard-h:hover{background:rgba(0,0,0,.02)}
  .gcard-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
  .gcard-t{flex:1;min-width:0}.gcard-t b{display:block;font-size:14.5px}.gcard-t span{font-size:12px;color:var(--muted)}
  .gcard-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--crimson);color:#fff;font-size:12px;font-weight:800;margin-inline-end:8px;flex:none;vertical-align:middle}
  .gcard-ch{color:var(--muted);transition:transform .2s;font-size:18px}
  .gcard.open .gcard-ch{transform:rotate(-90deg)}
  .gcard-b{display:none;padding:2px 15px 14px;background:rgba(255,255,255,.55)}
  .gcard.open .gcard-b{display:block}
  .gcard-b ol{margin:0;padding-inline-start:20px}.gcard-b li{margin-bottom:7px;line-height:1.6;font-size:13.5px}
  .g-purple{background:#f1effc}.g-purple .gcard-ic{background:#e7e1fb;color:#6b4fd6}
  .g-green{background:#e9f6ef}.g-green .gcard-ic{background:#d3edde;color:#1f8a4c}
  .g-orange{background:#fdf1e4}.g-orange .gcard-ic{background:#f9e0c6;color:#d6831f}
  .g-blue{background:#eaf1fc}.g-blue .gcard-ic{background:#d4e3f7;color:#2f6fd0}
  .g-pink{background:#fcf0f5}.g-pink .gcard-ic{background:#f6d9e6;color:#c84f80}
  .g-cyan{background:#e8f6f6}.g-cyan .gcard-ic{background:#cdebeb;color:#1f8a8a}

/* ---- key migration for data saved under the previous lists ---- */
const MIG_CAT={iv:"reagent",anticoag:"reagent",preservative:"reagent",wash:"reagent"};
const MIG_UNIT={ampoule:"bottle",liter:"other",ml:"other"};
const MIG_LAB={bloodbank:"donation",serology:"virology",hematology:"store",biochem:"store",micro:"store",other:"store"};
function migrateKeys(d){
  (d.items||[]).forEach(it=>{ if(MIG_CAT[it.category])it.category=MIG_CAT[it.category]; if(MIG_UNIT[it.unit])it.unit=MIG_UNIT[it.unit]; });
  (d.lots||[]).forEach(l=>{ if(MIG_LAB[l.lab])l.lab=MIG_LAB[l.lab]; });
  (d.txns||[]).forEach(x=>{ if(MIG_LAB[x.lab])x.lab=MIG_LAB[x.lab]; });
  return d;
}

const isRej=l=>!!l.rejected;
const isHeld=l=>l.qc==="pending"||l.qc==="failed"||!!l.recalled; /* محجوزة: غير قابلة للصرف (تحت فحص QC / فشل / مستدعاة) */
const availLots=code=>DB.lots.filter(l=>l.code===code&&l.qtyRemaining>0&&!isRej(l)&&!isHeld(l)).sort((a,b)=>(a.expiry||"9999").localeCompare(b.expiry||"9999"));
const allLotsOf=code=>DB.lots.filter(l=>l.code===code).sort((a,b)=>(a.expiry||"9999").localeCompare(b.expiry||"9999"));
const availQtyOf=code=>DB.lots.filter(l=>l.code===code&&!isRej(l)&&!isHeld(l)).reduce((s,l)=>s+(+l.qtyRemaining||0),0);
const rejectedQtyOf=code=>DB.lots.filter(l=>l.code===code&&isRej(l)).reduce((s,l)=>s+(+l.qtyRemaining||0),0);
const heldQtyOf=code=>DB.lots.filter(l=>l.code===code&&isHeld(l)&&(+l.qtyRemaining||0)>0).reduce((s,l)=>s+(+l.qtyRemaining||0),0);
function lotStatus(l){
  if(l.disposed) return {cls:"mut",key:"lst_disposed"};
  if(l.recalled) return {cls:"danger",key:"lst_recalled"};
  if(l.qc==="failed") return {cls:"danger",key:"lst_qc_failed"};
  if(l.qc==="pending") return {cls:"warn",key:"lst_quarantine"};
  if(isRej(l)) return {cls:"danger",key:"lst_rejected"};
  if((+l.qtyRemaining||0)<=0) return {cls:"mut",key:"lst_empty"};
  if(!l.expiry) return {cls:"info",key:"lst_no_date"};
  const d=daysTo(l.expiry);
  if(d<0) return {cls:"danger",key:"lst_expired"};
  if(d<=DB.settings.warnDays) return {cls:"warn",key:"lst_near",n:d};
  return {cls:"ok",key:"lst_valid"};
}
function lotStatusText(s){ return s.key==="lst_near"?t("lst_near",{n:s.n}):t(s.key); }
function itemStatus(it){
  const q=availQtyOf(it.code); const lots=availLots(it.code);
  const hasExpired=lots.some(l=>l.expiry&&daysTo(l.expiry)<0);
  const hasNear=lots.some(l=>l.expiry&&daysTo(l.expiry)>=0&&daysTo(l.expiry)<=DB.settings.warnDays);
  if(q<=0) return {cls:"mut",key:"st_out"};
  if(hasExpired) return {cls:"danger",key:"st_has_expired"};
  if(q<=(+it.minQty||0)) return {cls:"warn",key:"st_low"};
  if(hasNear) return {cls:"warn",key:"st_near"};
  return {cls:"ok",key:"st_available"};
}

function donut(data){
  const total=data.reduce((s,d)=>s+d.v,0)||1; let acc=0; const R=52,C=2*Math.PI*R; const segs=[];
  data.forEach(d=>{const len=d.v/total*C;
    segs.push(`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${d.c}" stroke-width="20" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-acc).toFixed(2)}" transform="rotate(-90 70 70)"/>`); acc+=len;});
  const tot=data.reduce((s,d)=>s+d.v,0);
  return `<svg width="140" height="140" viewBox="0 0 140 140"><circle r="${R}" cx="70" cy="70" fill="none" stroke="#eef0f3" stroke-width="20"/>${tot?segs.join(""):""}<text x="70" y="66" text-anchor="middle" font-size="26" font-weight="800" fill="#1f2530">${num(tot)}</text><text x="70" y="86" text-anchor="middle" font-size="12" fill="#6b7280">${t("lot_unit")}</text></svg>`;
}

let invFilter="all", invSearch="", invGroup="all";
function invSummary(){
  if(!DB.items.length) return "";
  const map={}; DB.items.forEach(it=>{ const k=it.category||"other"; if(!map[k])map[k]={n:0,q:0}; map[k].n++; map[k].q+=availQtyOf(it.code); });
  const rows=CATS.filter(c=>map[c.k]).map(c=>({lab:lbl(c),n:map[c.k].n,q:map[c.k].q}));
  Object.keys(map).forEach(k=>{ if(!CATS.some(c=>c.k===k)) rows.push({lab:k,n:map[k].n,q:map[k].q}); });
  return `<div class="panel"><div class="panel-h"><h3>${t("inv_summary_t")}</h3><span class="hint">${t("inv_summary_s")}</span></div><div class="panel-b"><div class="tbl-wrap"><table><thead><tr><th>${t("th_cat")}</th><th class="num">${t("inv_sum_items")}</th><th class="num">${t("inv_sum_qty")}</th></tr></thead><tbody>${rows.map(r=>`<tr><td><b>${esc(r.lab)}</b></td><td class="num">${num(r.n)}</td><td class="num">${num(r.q)}</td></tr>`).join("")}</tbody></table></div></div></div>`;
}
function invByDevice(){
  if(!DB.items.length) return "";
  const byGroup={}, unclassified=[];
  DB.items.forEach(it=>{ const c=catFind(it.code); const gk=c?c.group:null; if(gk)(byGroup[gk]=byGroup[gk]||[]).push(it); else unclassified.push(it); });
  const dtable=(title,items)=>{ const totQ=items.reduce((s,it)=>s+availQtyOf(it.code),0);
    const rows=items.slice().sort((a,b)=>String(a.name).localeCompare(String(b.name),"ar")).map(it=>{const st=itemStatus(it);return `<tr><td><span class="tag mut mono">${esc(it.code)}</span></td><td><b>${esc(it.name)}</b></td><td class="num"><b>${num(availQtyOf(it.code))}</b></td><td>${esc(labelOf(UNITS,it.unit))}</td><td><span class="tag ${st.cls}">${t(st.key)}</span></td></tr>`;}).join("");
    return `<div style="margin-bottom:18px"><div style="font-weight:800;font-size:14px;color:var(--crimson-dark);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">🔬 ${esc(title)} <span class="tag mut" style="font-weight:700">${t("inv_dev_count",{n:num(items.length),q:num(totQ)})}</span></div><div class="tbl-wrap"><table><thead><tr><th>${t("th_code")}</th><th>${t("th_name")}</th><th class="num">${t("th_qty")}</th><th>${t("th_unit")}</th><th>${t("th_status")}</th></tr></thead><tbody>${rows}</tbody></table></div></div>`; };
  let sections="";
  CATALOG.forEach(g=>{ const list=byGroup[g.g]; if(list&&list.length) sections+=dtable(lbl(g),list); });
  if(unclassified.length) sections+=dtable(t("inv_dev_other"),unclassified);
  if(!sections) return "";
  return `<div class="panel"><div class="panel-h"><h3>${t("inv_bydevice_t")}</h3><span class="hint">${t("inv_bydevice_s")}</span></div><div class="panel-b">${sections}</div></div>`;
}
pages.inventory=()=>`

afterRender.inventory=()=>{
  $("invSearch").addEventListener("input",e=>{invSearch=e.target.value;renderInv();});

  $("invGroupSel").addEventListener("change",e=>{invGroup=e.target.value;renderInv();});
  $("invSeg").querySelectorAll("button").forEach(b=>b.onclick=()=>{invFilter=b.dataset.f;go("inventory");});

function matchFilter(it){
  const st=itemStatus(it).key; const q=availQtyOf(it.code);
  if(invFilter==="all")return true;
  if(invFilter==="ok")return st==="st_available";
  if(invFilter==="warn")return st==="st_low"||st==="st_near";
  if(invFilter==="danger")return st==="st_has_expired"||availLots(it.code).some(l=>l.expiry&&daysTo(l.expiry)<0)||rejectedQtyOf(it.code)>0;
  if(invFilter==="out")return q<=0;
  return true;
}
function matchGroup(it){
  if(invGroup==="all")return true;
  const c=catFind(it.code);
  return !!(c&&c.group===invGroup);
}
function renderInv(){
  const s=invSearch.trim().toLowerCase();
  let rows=DB.items.filter(it=>{const hit=!s||[it.name,it.code,it.manufacturer,labelOf(CATS,it.category)].some(v=>String(v||"").toLowerCase().includes(s));return hit&&matchFilter(it)&&matchGroup(it);}).sort((a,b)=>a.name.localeCompare(b.name,"ar"));
  if(!DB.items.length){ $("invBody").innerHTML=`<div class="empty"><div class="em-ic">📦</div><h4>${t("inv_empty_t")}</h4><p>${t("inv_empty_s")}</p><button class="btn" style="margin-top:10px" onclick="App.go('receive')">${t("btn_receive_solution")}</button></div>`; return; }

  let h=`<div class="tbl-wrap"><table><thead><tr><th>${t("th_code")}</th><th>${t("th_name")}</th><th>${t("th_man")}</th><th>${t("th_cat")}</th><th class="num">${t("th_qty")}</th><th>${t("th_unit")}</th><th class="num">${t("th_lots")}</th><th>${t("th_status")}</th><th>${t("th_actions")}</th></tr></thead><tbody>`;
  rows.forEach(it=>{const st=itemStatus(it); const active=availLots(it.code); const rej=rejectedQtyOf(it.code);
    h+=`<tr>
      <td><span class="tag mut mono">${esc(it.code)}</span></td>
      <td><b>${esc(it.name)}</b>${rej>0?`<div class="muted" style="font-size:11px">${t("rejected_note",{q:num(rej)})}</div>`:""}</td>

function doReceive(print){
  const v=id=>$(id).value.trim();
  const code=v("rc-code"),name=v("rc-name"),lot=v("rc-lot"),exp=$("rc-exp").value,qty=+$("rc-qty").value;

  if(!it){ it={id:uid(),code,name,manufacturer:v("rc-man"),category:$("rc-cat").value,unit:$("rc-unit").value,minQty:+$("rc-min").value||0,createdAt:new Date().toISOString()}; DB.items.push(it); }
  else{ it.name=name||it.name; it.manufacturer=v("rc-man")||it.manufacturer; it.category=$("rc-cat").value; it.unit=$("rc-unit").value; it.minQty=+$("rc-min").value||0; }
  let lotRec = !rejected && !needQC && DB.lots.find(l=>l.code===code&&l.lot===lot&&l.expiry===exp&&!isRej(l)&&!isHeld(l));
  if(lotRec){ lotRec.qtyReceived+=qty; lotRec.qtyRemaining+=qty; }
  else{ const nl={id:uid(),code,lot,expiry:exp,qtyReceived:qty,qtyRemaining:qty,supplier:v("rc-sup"),lab,inspection:insp,rejected,receivedAt:($("rc-date").value||todayISO())}; if(needQC)nl.qc="pending"; DB.lots.push(nl); }
  DB.txns.push({id:uid(),type:"in",code,lot,qty,date:($("rc-date").value||todayISO()),party:v("rc-sup")||t("party_incoming"),lab,inspection:insp,note:(needQC?(t("qc_quarantined_note")+(v("rc-note")?" — "+v("rc-note"):"")):v("rc-note")),user:curUser()});

}

function dispenseAvail(){ return DB.items.filter(i=>availQtyOf(i.code)>0); }
function dispenseGroupsHTML(){
  const avail=dispenseAvail(); let unclassified=false;

  avail.forEach(i=>{ const c=catFind(i.code); if(c&&c.group)present.add(c.group); else unclassified=true; });

function dispenseItemsFor(gk){

function doDispense(){
  const code=$("ds-code").value, qty=+$("ds-qty").value;
  if(!code)return toast(t("err_pick_item"),"err");
  if(!qty||qty<=0)return toast(t("err_qty"),"err");
  const avail=availQtyOf(code);
  if(qty>avail)return toast(t("err_over",{q:num(qty),a:num(avail)}),"err");
  const lab=$("ds-lab").value, date=$("ds-date").value||todayISO(), note=$("ds-note").value.trim();
  const it=DB.items.find(i=>i.code===code);
  const lots=availLots(code); // oldest expiry first (FIFO)
  // plan the FIFO allocation WITHOUT mutating
  let rem=qty; const plan=[];
  for(const l of lots){ if(rem<=0)break; const take=Math.min(rem,l.qtyRemaining); plan.push({l,take}); rem-=take; }
  const oldest=plan.length?plan[0].l:null;
  const oldestExpired=oldest&&oldest.expiry&&daysTo(oldest.expiry)<0;
  const newLots=plan.filter(p=>p.l.qtyRemaining===p.l.qtyReceived).map(p=>p.l.lot||"—");
  // build alerts
  let alerts="";
  if(oldestExpired) alerts+=`<div class="help-box" style="background:var(--danger-soft);border-color:#f3c9c4;color:var(--danger);margin-bottom:8px">${t("dis_alert_expired",{lot:esc(oldest.lot||"—"),d:fmtG(oldest.expiry)})}</div>`;
  else if(lots.length>1) alerts+=`<div class="help-box" style="background:var(--warn-soft);border-color:#f0d9a0;color:#8a5a00;margin-bottom:8px">${t("dis_alert_older",{lot:esc(oldest?oldest.lot||"—":"—"),d:oldest?fmtG(oldest.expiry):"—"})}</div>`;
  if(newLots.length) alerts+=`<div class="help-box" style="margin-bottom:8px">${t("dis_alert_newlot",{lots:esc(newLots.join("، "))})}</div>`;
  if(needsL2L(code)&&newLots.length) alerts+=`<div class="help-box" style="background:var(--info-soft);border-color:#cfe0f3;color:#284b6e;margin-bottom:8px">🖨️ ${t("l2l_dispense_note")}</div>`;
  const rowsH=plan.map(p=>{const st=lotStatus(p.l);const isN=p.l.qtyRemaining===p.l.qtyReceived;return `<tr><td class="mono">${esc(p.l.lot||"—")}${isN?` <span class="tag info" style="font-size:10px">${t("dis_newlot_tag")}</span>`:""}</td><td>${fmtG(p.l.expiry)}</td><td class="num"><b>${num(p.take)}</b></td><td><span class="tag ${st.cls}">${lotStatusText(st)}</span></td></tr>`;}).join("");
  const newLotIds=new Set(plan.map(p=>p.l.id));
  let prevLotHtml="";
  if(needsL2L(code)&&newLots.length){
    const prevLots=DB.lots.filter(l=>l.code===code&&!newLotIds.has(l.id)).sort((a,b)=>(b.expiry||"").localeCompare(a.expiry||""));
    // auto-detect old lot from most recent out-transaction for this item
    const lastOutLot=(DB.txns.filter(x=>x.type==="out"&&x.code===code).sort((a,b)=>(b.id>a.id?1:-1))[0]||{}).lot||"";
    if(prevLots.length) prevLotHtml=`<div style="margin-top:12px"><label style="font-size:13px;font-weight:600;color:var(--muted)">${t("l2l_prevlot")}</label><select id="l2l-prevlot" style="width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:var(--r-sm);margin-top:5px;font-size:14px"><option value="">${t("l2l_prevlot_pick")}</option>${prevLots.map(l=>`<option value="${esc(l.lot||"—")}"${lastOutLot&&(l.lot||"—")===lastOutLot?" selected":""}>${esc(l.lot||"—")} — ${fmtG(l.expiry)}</option>`).join("")}</select></div>`;
  }
  const body=`<p style="margin:0 0 10px">${t("dis_confirm_intro",{q:num(qty),u:esc(labelOf(UNITS,it?it.unit:"")),name:esc(it?it.name:code)})}</p>
    ${alerts}
    <div class="tbl-wrap"><table style="font-size:13px"><thead><tr><th>${t("th_lot")}</th><th>${t("th_exp")}</th><th class="num">${t("dis_th_take")}</th><th>${t("th_status")}</th></tr></thead><tbody>${rowsH}</tbody></table></div>${prevLotHtml}`;
  modal(t("dis_confirm_title"),body,`<button class="btn" id="dc-yes">${t("btn_confirm_dispense")}</button><button class="btn ghost" onclick="App.closeModal()">${t("btn_cancel")}</button>`);
  const planNewLot=plan.map(p=>p.l.lot||"—").join(", ");
  $("dc-yes").onclick=()=>{ const prevLot=($("l2l-prevlot")||{}).value||""; closeModal(); commitDispense(code,qty,lab,date,note,prevLot,planNewLot); };
}
function commitDispense(code,qty,lab,date,note,prevLot,knownNewLot){
  const avail=availQtyOf(code);
  if(qty>avail)return toast(t("err_over",{q:num(qty),a:num(avail)}),"err");
  let rem=qty; const used=[], usedDetail=[]; let hasNewLot=false;
  for(const l of availLots(code)){if(rem<=0)break;const take=Math.min(rem,l.qtyRemaining);if(l.qtyRemaining===l.qtyReceived)hasNewLot=true;l.qtyRemaining-=take;rem-=take;used.push(l.lot||"—");usedDetail.push({lot:l.lot||"—",expiry:l.expiry||"",take});}
  DB.txns.push({id:uid(),type:"out",code,lot:used.join(", "),qty,date,party:labelOf(labs(),lab),lab,note,user:curUser()});
  save(); toast(t("ok_dispense"),"ok");
  if(needsL2L(code)&&hasNewLot){ const it=DB.items.find(i=>i.code===code); printL2LForm(it||{code,name:code,unit:""},usedDetail,qty,lab,date,prevLot||"",knownNewLot||used.join(", ")); }
  // reset form in place without full page re-render
  if($("ds-code")){ $("ds-code").value=""; $("ds-qty").value=""; if($("ds-note")) $("ds-note").value=""; if($("ds-info")) $("ds-info").innerHTML=""; if($("ds-date")) $("ds-date").value=todayISO(); if($("ds-kits")) $("ds-kits").value=""; if($("ds-kits-wrap")) $("ds-kits-wrap").style.display="none"; window.scrollTo(0,0); }
  else { go("dispense"); }
}

const C39={'0':'nnnwwnwnn','1':'wnnwnnnnw','2':'nnwwnnnnw','3':'wnwwnnnnn','4':'nnnwwnnnw','5':'wnnwwnnnn','6':'nnwwwnnnn','7':'nnnwnnwnw','8':'wnnwnnwnn','9':'nnwwnnwnn','A':'wnnnnwnnw','B':'nnwnnwnnw','C':'wnwnnwnnn','D':'nnnnwwnnw','E':'wnnnwwnnn','F':'nnwnwwnnn','G':'nnnnnwwnw','H':'wnnnnwwnn','I':'nnwnnwwnn','J':'nnnnwwwnn','K':'wnnnnnnww','L':'nnwnnnnww','M':'wnwnnnnwn','N':'nnnnwnnww','O':'wnnnwnnwn','P':'nnwnwnnwn','Q':'nnnnnnwww','R':'wnnnnnwwn','S':'nnwnnnwwn','T':'nnnnwnwwn','U':'wwnnnnnnw','V':'nwwnnnnnw','W':'wwwnnnnnn','X':'nwnnwnnnw','Y':'wwnnwnnnn','Z':'nwwnwnnnn','-':'nwnnnnwnw','.':'wwnnnnwnn',' ':'nwwnnnwnn','$':'nwnwnwnnn','/':'nwnwnnnwn','+':'nwnnnwnwn','%':'nnnwnwnwn','*':'nwnnwnwnn'};
function code39SVG(text){
  text=text.toUpperCase().replace(/[^0-9A-Z\-\.\ \$\/\+%]/g,"-"); const seq="*"+text+"*"; const NW=2,WW=6,H=64,gap=2; let x=0; const r=[];
  for(const ch of seq){const p=C39[ch]; if(!p)continue; for(let i=0;i<p.length;i++){const w=p[i]==='w'?WW:NW; if(i%2===0)r.push(`<rect x="${x}" y="0" width="${w}" height="${H}" fill="#000"/>`); x+=w;} x+=gap;}
  return `<svg width="${Math.min(x,460)}" viewBox="0 0 ${x} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="height:64px">${r.join("")}</svg>`;
}

let scanStream=null, scanRAF=null, scanDetector=null;
function scan(){

  modal(t("scan_title"),`<p class="muted" style="margin-top:0">${t("scan_hint")}</p>
    <div class="field"><input id="scan-input" placeholder="${t("scan_ph")}" autocomplete="off" autocapitalize="characters" style="font-size:18px;font-family:monospace;text-align:center;letter-spacing:1px"></div>

  const inp=$("scan-input"); if(inp){ inp.focus(); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); resolveScan(inp.value); } }); }

function resolveScan(code){
  code=String(code||"").trim(); const box=$("scan-result"); if(!box||!code)return;
  const it=DB.items.find(i=>String(i.code).toLowerCase()===code.toLowerCase());
  if(it){

      <div class="stat-line"><span>${t("th_qty")}: <b>${num(q)} ${esc(labelOf(UNITS,it.unit))}</b></span><span>${t("th_lots")}: ${num(availLots(it.code).length)}</span>${held>0?`<span class="tag warn">${t("lst_quarantine")}: ${num(held)}</span>`:""}</div>
      <hr class="sep"><div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn sm soft" onclick="App.scanGo('view','${jsq(it.code)}')">👁 ${t("scan_view")}</button>
        <button class="btn sm soft" onclick="App.scanGo('receive','${jsq(it.code)}')">📥 ${t("nav_receive")}</button>
        <button class="btn sm soft" onclick="App.scanGo('dispense','${jsq(it.code)}')">📤 ${t("btn_dispense")}</button>
      </div></div></div>`;
  } else {
    const cat=catFind(code);
    box.innerHTML=`<div class="help-box" style="background:var(--warn-soft);border-color:#f0d9a0;color:#8a5a00">${t("scan_not_found",{code:esc(code)})}${cat?(" — "+esc(cat.n)):""}<div style="margin-top:8px"><button class="btn sm soft" onclick="App.scanGo('receive','${jsq(code)}')">📥 ${t("scan_receive_new")}</button></div></div>`;
  }
}
function scanGo(action,code){ stopScanCam(); closeModal();
  if(action==="view"){ invSearch=code; invFilter="all"; go("inventory"); setTimeout(()=>toggleLots(code),90); }
  else if(action==="receive"){ go("receive"); setTimeout(()=>{const e=$("rc-code"); if(e){e.value=code; onCodeType();}},90); }
  else if(action==="dispense"){ go("dispense"); setTimeout(()=>{const e=$("ds-code"); if(e){e.value=code; if([...e.options].some(o=>o.value===code)){dispenseInfo();}else{toast(t("dis_empty_t"),"err");}}},90); }
}
async function startScanCam(){
  try{ if(!("BarcodeDetector" in window))return;
    scanDetector=scanDetector||new window.BarcodeDetector({formats:["code_39","code_128","code_93","ean_13","ean_8","upc_a","upc_e","codabar","itf","qr_code"]});
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    const v=$("scan-video"); if(!v){stopScanCam();return;}
    $("scan-cam-wrap").style.display="block"; v.srcObject=scanStream; await v.play();
    const tick=async()=>{ if(!scanStream)return;
      try{ const codes=await scanDetector.detect(v); if(codes&&codes.length){ const val=codes[0].rawValue; stopScanCam(); const inp=$("scan-input"); if(inp)inp.value=val; resolveScan(val); return; } }catch(e){}
      scanRAF=requestAnimationFrame(tick); };
    scanRAF=requestAnimationFrame(tick);
  }catch(e){ toast(t("scan_cam_err"),"err"); stopScanCam(); }
}
function stopScanCam(){ if(scanRAF){cancelAnimationFrame(scanRAF);scanRAF=null;} if(scanStream){scanStream.getTracks().forEach(tr=>tr.stop());scanStream=null;} const w=$("scan-cam-wrap"); if(w)w.style.display="none"; }

  $("logSeg").querySelectorAll("button").forEach(b=>b.onclick=()=>{logType=b.dataset.f;go("log");});
  renderLog();
};
function renderLog(){
  const s=logSearch.trim().toLowerCase();
  let rows=DB.txns.filter(x=>(logType==="all"||x.type===logType)&&(!s||[x.code,x.party,x.note,x.lot,labelOf(labs(),x.lab)].some(v=>String(v||"").toLowerCase().includes(s)))).sort((a,b)=>(b.date||"").localeCompare(a.date||"")||(b.id>a.id?1:-1));
  if(!rows.length){ $("logBody").innerHTML=`<div class="empty"><div class="em-ic">📜</div><h4>${t("log_empty")}</h4></div>`; return; }
  const meta={in:{cls:"ok",i:"📥"},out:{cls:"danger",i:"📤"},adjust:{cls:"info",i:"⚖️"},dispose:{cls:"danger",i:"🚮"}};
  const tt={in:t("f_in"),out:t("f_out"),adjust:t("f_adjust"),dispose:t("f_dispose")};
  let h=`<div class="tbl-wrap"><table><thead><tr><th>${t("th_date")}</th><th>${t("th_type")}</th><th>${t("th_code")}</th><th>${t("th_name")}</th><th>${t("th_lot")}</th><th class="num">${t("th_qty")}</th><th>${t("th_lab")}</th><th>${t("th_party")}</th><th>${t("th_inspection")}</th><th>${t("th_user")}</th><th>${t("th_notes")}</th></tr></thead><tbody>`;
  rows.forEach(x=>{const m=meta[x.type]||meta.adjust; const it=DB.items.find(i=>i.code===x.code);
    const insp = x.type==="in"&&x.inspection ? `<span class="tag ${x.inspection==="rejected"?"danger":"ok"}">${labelOf(INSPECT,x.inspection)}</span>` : "—";
    h+=`<tr><td>${fmtG(x.date)}</td><td><span class="tag ${m.cls}">${m.i} ${tt[x.type]||x.type}</span></td><td class="mono">${esc(x.code)}</td><td>${esc(it?it.name:"—")}</td><td class="mono">${esc(x.lot||"—")}</td><td class="num"><b>${(x.type==="out"||x.type==="dispose")?"−":"+"}${num(x.qty)}</b></td><td>${esc(labelOf(labs(),x.lab))}</td><td>${esc(x.party||"—")}</td><td>${insp}</td><td>${esc(x.user||"—")}</td><td>${esc(x.note||"—")}</td></tr>`;});
  h+=`</tbody></table></div><div class="stat-line"><span>${t("moves_count",{n:num(rows.length)})}</span></div>`;
  $("logBody").innerHTML=h;
}

/* Reports */
let repFrom=repMonthStart(), repTo=todayISO(), repEmp="";
function repMonthStart(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01"; }
function repYMD(y,m,day){ const d=new Date(y,m,day); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function setRepRange(f,t){ if(f)repFrom=f; if(t)repTo=t; go("reports"); }
function setRepEmp(v){ repEmp=v||""; go("reports"); }
function repPreset(k){ const d=new Date(),y=d.getFullYear(),m=d.getMonth();
  if(k==="month"){ repFrom=repYMD(y,m,1); repTo=todayISO(); }
  else if(k==="lastmonth"){ repFrom=repYMD(y,m-1,1); repTo=repYMD(y,m,0); }
  else if(k==="year"){ repFrom=y+"-01-01"; repTo=todayISO(); }
  else if(k==="all"){ repFrom="2000-01-01"; repTo=todayISO(); }
  go("reports"); }
function rangeTxns(){ return DB.txns.filter(x=>{ const dt=String(x.date||""); return dt>=repFrom&&dt<=repTo&&(!repEmp||x.user===repEmp); }); }
function allEmployees(){ const s=new Set(); (DB.settings.users||[]).forEach(u=>s.add(u.u)); DB.txns.forEach(x=>{ if(x.user)s.add(x.user); }); return [...s].sort((a,b)=>String(a).localeCompare(String(b),"ar")); }
function periodData(){ const map={}; rangeTxns().forEach(x=>{ const k=x.code; if(!map[k])map[k]={inq:0,outq:0}; if(x.type==="in")map[k].inq+=(+x.qty||0); else if(x.type==="out")map[k].outq+=(+x.qty||0); }); return Object.entries(map).map(([code,v])=>{const it=DB.items.find(i=>i.code===code);return {code,name:it?it.name:code,inq:v.inq,outq:v.outq};}).sort((a,b)=>b.outq-a.outq||b.inq-a.inq); }
function employeeData(){ const map={}; rangeTxns().forEach(x=>{ const u=x.user||"—"; if(!map[u])map[u]={ops:0,inq:0,outq:0,adj:0}; map[u].ops++; if(x.type==="in")map[u].inq+=(+x.qty||0); else if(x.type==="out")map[u].outq+=(+x.qty||0); else map[u].adj++; }); return Object.entries(map).map(([user,v])=>({user,...v})).sort((a,b)=>b.ops-a.ops); }

    <div class="kpi"><div class="lbl">${t("rep_cons_t")}</div><div class="sub" style="margin:8px 0 12px">${t("rep_cons_s")}</div><button class="btn sm soft full" onclick="App.exportCSV('consumption')">${t("btn_export")}</button></div>
    <div class="kpi"><div class="lbl">${t("rep_lab_t")}</div><div class="sub" style="margin:8px 0 12px">${t("rep_lab_s")}</div><button class="btn sm soft full" onclick="App.exportCSV('labusage')">${t("btn_export")}</button></div>
    <div class="kpi"><div class="lbl">${t("rep_disposal_t")}</div><div class="sub" style="margin:8px 0 12px">${t("rep_disposal_s")}</div><button class="btn sm soft full" onclick="App.exportCSV('disposal')">${t("btn_export")}</button></div>
    <div class="kpi"><div class="lbl">${t("rep_recall_t")}</div><div class="sub" style="margin:8px 0 12px">${t("rep_recall_s")}</div><button class="btn sm soft full" onclick="App.exportCSV('recall')">${t("btn_export")}</button></div>
  </div>
  <div class="print-grid">
  <div class="panel"><div class="panel-h"><h3>${t("rep_exp_panel")}</h3><span class="hint">${t("lots_count",{n:num(expired.length+near.length)})}</span></div><div class="panel-b">
    ${(expired.length+near.length)?`<div class="tbl-wrap"><table><thead><tr><th>${t("th_name")}</th><th>${t("th_lot")}</th><th>${t("th_exp")}</th><th class="num">${t("th_remaining")}</th><th>${t("th_status")}</th></tr></thead><tbody>${[...expired,...near].map(l=>{const it=DB.items.find(i=>i.code===l.code);const st=lotStatus(l);return `<tr><td><b>${esc(it?it.name:l.code)}</b></td><td class="mono">${esc(l.lot||"—")}</td><td>${fmtG(l.expiry)}</td><td class="num">${num(l.qtyRemaining)}</td><td><span class="tag ${st.cls}">${lotStatusText(st)}</span></td></tr>`;}).join("")}</tbody></table></div>`:emptyMini(t("no_exp_lots"))}

    ${cons.length?`<div class="tbl-wrap"><table><thead><tr><th>#</th><th>${t("th_name")}</th><th class="num">${t("th_total_dispensed")}</th></tr></thead><tbody>${cons.map((c,i)=>`<tr><td>${i+1}</td><td><b>${esc(c[0])}</b></td><td class="num">${num(c[1])}</td></tr>`).join("")}</tbody></table></div>`:emptyMini(t("no_dispense"))}

  <div class="panel no-print"><div class="panel-b">
    <div class="form-grid">

    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"><button class="btn sm ghost" onclick="App.repPreset('month')">${t("rep_this_month")}</button><button class="btn sm ghost" onclick="App.repPreset('lastmonth')">${t("rep_last_month")}</button><button class="btn sm ghost" onclick="App.repPreset('year')">${t("rep_this_year")}</button><button class="btn sm ghost" onclick="App.repPreset('all')">${t("rep_all_time")}</button></div>
  </div></div>
  <div class="panel"><div class="panel-h"><h3>${t("rep_period_t")}</h3><span class="hint">${esc(repFrom)} → ${esc(repTo)}${repEmp?(" · "+esc(repEmp)):""}</span></div><div class="panel-b">
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn sm soft no-print" onclick="App.exportCSV('period')">${t("btn_export")}</button></div>
    ${(()=>{const d=periodData();if(!d.length)return emptyMini(t("rep_no_month_data"));return `<div class="tbl-wrap"><table><thead><tr><th>${t("th_name")}</th><th>${t("th_code")}</th><th class="num">${t("rep_received")}</th><th class="num">${t("rep_dispensed")}</th></tr></thead><tbody>${d.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td class="mono">${esc(r.code)}</td><td class="num">${num(r.inq)}</td><td class="num">${num(r.outq)}</td></tr>`).join("")}</tbody></table></div>`;})()}
  </div></div>
  <div class="panel"><div class="panel-h"><h3>${t("rep_emp_t")}</h3><span class="hint">${esc(repFrom)} → ${esc(repTo)}</span></div><div class="panel-b">

/* Settings */
/* ===== Reorder / replenishment ===== */
function reorderList(){ const wd=DB.settings.warnDays||60; return DB.items.map(it=>{const q=availQtyOf(it.code),m=+it.minQty||0;const threshold=Math.ceil((m||0)*1.5);const expLots=DB.lots.filter(l=>l.code===it.code&&l.qtyRemaining>0&&!isRej(l)&&l.expiry&&daysTo(l.expiry)<=wd);const nearExp=expLots.length>0;const qtyReason=m>0&&q<=threshold;if(!qtyReason&&!nearExp)return null;const soonest=nearExp?expLots.map(l=>l.expiry).filter(Boolean).sort()[0]:null;let tier;if(q<=0)tier="out";else if(nearExp)tier="expiry";else if(m>0&&q<=m)tier="below";else tier="near";const qtyGap=Math.max(0,(m*2)-q);const expQty=expLots.reduce((s,l)=>s+(+l.qtyRemaining||0),0);const suggest=qtyGap>0?qtyGap:Math.max(1,expQty);const ls=DB.lots.filter(l=>l.code===it.code&&l.supplier).sort((a,b)=>(b.receivedAt||"").localeCompare(a.receivedAt||""));return {it,q,m,tier,suggest,soonest,supplier:ls.length?ls[0].supplier:"",ord:(DB.settings.orders||{})[it.code]};}).filter(Boolean).sort((a,b)=>{const o={out:0,expiry:1,below:2,near:3};return (o[a.tier]-o[b.tier])||((a.q-a.m)-(b.q-b.m));}); }
pages.reorder=()=>{ const low=reorderList(); return `
  <div class="page-head"><div><h2>${t("reorder_title")}</h2><p>${t("reorder_sub")}</p></div>
    <div class="head-actions">${low.length?`<button class="btn soft" onclick="App.exportCSV('requisition')">${t("btn_export_req")}</button><button class="btn ghost no-print" onclick="window.print()">${t("btn_print")}</button>`:""}</div></div>
  <div class="panel"><div class="panel-h"><h3>${t("reorder_title")}</h3><span class="hint">${low.length?t("reorder_count",{n:num(low.length)}):""}</span></div><div class="panel-b">
  ${low.length?`<div class="tbl-wrap"><table><thead><tr><th>${t("th_code")}</th><th>${t("th_name")}</th><th class="num">${t("reorder_th_current")}</th><th class="num">${t("reorder_th_min")}</th><th class="num">${t("reorder_th_suggest")}</th><th>${t("reorder_th_last")}</th><th>${t("reorder_status")}</th><th class="no-print"></th></tr></thead><tbody>
  ${low.map(r=>`<tr><td><span class="tag mut mono">${esc(r.it.code)}</span></td><td><b>${esc(r.it.name)}</b></td><td class="num"><b style="color:var(--danger)">${num(r.q)}</b></td><td class="num">${num(r.m)}</td><td class="num"><b>${num(r.suggest)}</b> ${esc(labelOf(UNITS,r.it.unit))}</td><td>${esc(r.supplier||"—")}</td><td>${r.ord?`<span class="tag mut">${t("reorder_ordered_on",{d:fmtG(r.ord.date)})}</span>`:(r.tier==="expiry"?`<span class="tag warn">${t("reorder_expiry")} · ${fmtG(r.soonest)}</span>`:`<span class="tag ${({out:"danger",below:"warn",near:"info"})[r.tier]}">${t(({out:"reorder_out",below:"reorder_below",near:"reorder_near"})[r.tier])}</span>`)}</td><td class="no-print"><button class="btn sm ${r.ord?"ghost":"soft"}" onclick="App.toggleOrder('${jsq(r.it.code)}')">${r.ord?t("reorder_unmark"):t("reorder_mark")}</button></td></tr>`).join("")}
  </tbody></table></div>`:`<div class="empty"><div class="em-ic">✅</div><h4>${t("reorder_none")}</h4></div>`}
  </div></div>`; };
function toggleOrder(code){ const o=DB.settings.orders||(DB.settings.orders={}); if(o[code]) delete o[code]; else o[code]={date:todayISO(),by:curUser()}; save(); toast(o[code]?t("ok_ordered"):t("ok_edited"),"ok"); go("reorder"); }

/* ===== Lot trace / recall ===== */
let traceQ="";
pages.trace=()=>`
  <div class="page-head"><div><h2>${t("trace_title")}</h2><p>${t("trace_sub")}</p></div></div>
  <div class="panel"><div class="panel-b">
    <div class="toolbar"><div class="search"><span class="si">🔎</span><input id="trace-input" placeholder="${t("trace_search_ph")}" value="${esc(traceQ)}" list="lotList"><datalist id="lotList">${[...new Set(DB.lots.map(l=>l.lot).filter(Boolean))].map(l=>`<option value="${esc(l)}"></option>`).join("")}</datalist></div>
    <button class="btn" onclick="App.doTrace()">${t("trace_btn")}</button></div>
    <div id="traceResult"></div>
  </div></div>`;
afterRender.trace=()=>{ const inp=$("trace-input"); if(inp) inp.addEventListener("keydown",e=>{ if(e.key==="Enter") doTrace(); }); renderTrace(); };
function doTrace(){ const inp=$("trace-input"); traceQ=inp?inp.value.trim():""; renderTrace(); }
function renderTrace(){
  const box=$("traceResult"); if(!box)return; const q=traceQ.trim();
  if(!q){ box.innerHTML=`<div class="empty"><div class="em-ic">🔎</div><h4>${t("trace_enter")}</h4></div>`; return; }
  const ql=q.toLowerCase();
  const lots=DB.lots.filter(l=>String(l.lot||"").toLowerCase()===ql);
  const moves=DB.txns.filter(x=>String(x.lot||"").toLowerCase().split(/,\s*/).map(s=>s.trim()).includes(ql));
  if(!lots.length&&!moves.length){ box.innerHTML=`<div class="empty"><div class="em-ic">🚫</div><h4>${t("trace_not_found")}</h4></div>`; return; }
  const recv=lots.reduce((s,l)=>s+(+l.qtyReceived||0),0), rem=lots.reduce((s,l)=>s+(+l.qtyRemaining||0),0);
  const disp=moves.filter(x=>x.type==="out").reduce((s,x)=>s+(+x.qty||0),0), destroyed=moves.filter(x=>x.type==="dispose").reduce((s,x)=>s+(+x.qty||0),0);
  const meta={in:{cls:"ok",i:"📥"},out:{cls:"danger",i:"📤"},adjust:{cls:"info",i:"⚖️"},dispose:{cls:"danger",i:"🚮"}};
  const tt={in:t("f_in"),out:t("f_out"),adjust:t("f_adjust"),dispose:t("f_dispose")};
  let h=`<div class="grid kpis" style="margin:6px 0 14px">
    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("trace_sum_recv")}</div><div class="val">${num(recv)}</div></div><div class="kpi-ic green">📥</div></div>
    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("trace_sum_disp")}</div><div class="val">${num(disp)}</div></div><div class="kpi-ic blue">📤</div></div>
    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("trace_sum_destroyed")}</div><div class="val">${num(destroyed)}</div></div><div class="kpi-ic red">🚮</div></div>
    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("trace_sum_rem")}</div><div class="val">${num(rem)}</div></div><div class="kpi-ic greend">🧊</div></div></div>`;
  h+=`<div class="panel"><div class="panel-h"><h3>${t("trace_lots_h")}</h3></div><div class="panel-b"><div class="tbl-wrap"><table><thead><tr><th>${t("th_name")}</th><th>${t("th_code")}</th><th>${t("th_exp")}</th><th class="num">${t("th_received")}</th><th class="num">${t("th_remaining")}</th><th>${t("th_lab")}</th><th>${t("th_supplier")}</th><th>${t("th_status")}</th></tr></thead><tbody>${lots.length?lots.map(l=>{const it=DB.items.find(i=>i.code===l.code);const st=lotStatus(l);return `<tr><td><b>${esc(it?it.name:l.code)}</b></td><td class="mono">${esc(l.code)}</td><td>${fmtG(l.expiry)}</td><td class="num">${num(l.qtyReceived)}</td><td class="num"><b>${num(l.qtyRemaining)}</b></td><td>${esc(labelOf(labs(),l.lab))}</td><td>${esc(l.supplier||"—")}</td><td><span class="tag ${st.cls}">${lotStatusText(st)}</span></td></tr>`;}).join(""):`<tr><td colspan="8" class="muted" style="text-align:center">—</td></tr>`}</tbody></table></div></div></div>`;
  h+=`<div class="panel"><div class="panel-h"><h3>${t("trace_moves_h")}</h3><span class="hint">${t("moves_count",{n:num(moves.length)})}</span></div><div class="panel-b"><div class="tbl-wrap"><table><thead><tr><th>${t("th_date")}</th><th>${t("th_type")}</th><th class="num">${t("th_qty")}</th><th>${t("th_lab")}</th><th>${t("th_party")}</th><th>${t("th_user")}</th><th>${t("th_notes")}</th></tr></thead><tbody>${moves.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(x=>{const m=meta[x.type]||meta.adjust;return `<tr><td>${fmtG(x.date)}</td><td><span class="tag ${m.cls}">${m.i} ${tt[x.type]||x.type}</span></td><td class="num"><b>${(x.type==="out"||x.type==="dispose")?"−":"+"}${num(x.qty)}</b></td><td>${esc(labelOf(labs(),x.lab))}</td><td>${esc(x.party||"—")}</td><td>${esc(x.user||"—")}</td><td>${esc(x.note||"—")}</td></tr>`;}).join("")}</tbody></table></div></div></div>`;
  box.innerHTML=h;
}

function addTempUnit(){ const name=$("tu-name").value.trim(); let mn=+$("tu-min").value, mx=+$("tu-max").value;
  if(!name||isNaN(mn)||isNaN(mx)||mn===mx)return toast(t("temp_unit_need"),"err");
  if(mn>mx){const tmp=mn;mn=mx;mx=tmp;}
  DB.settings.tempUnits=DB.settings.tempUnits||[]; DB.settings.tempUnits.push({id:uid(),name,min:mn,max:mx}); save(); go("temp"); }
function delTempUnit(id){ DB.settings.tempUnits=(DB.settings.tempUnits||[]).filter(u=>u.id!==id); save(); go("temp"); }
function logTemp(){ const unitId=$("tp-unit").value, valStr=$("tp-val").value, val=+valStr, date=$("tp-date").value||todayISO();
  const u=(DB.settings.tempUnits||[]).find(x=>x.id===unitId); if(!u||valStr==="")return toast(t("temp_need"),"err");
  const exc=(val<u.min||val>u.max);
  DB.tempLogs=DB.tempLogs||[]; DB.tempLogs.push({id:uid(),unitId,unitName:u.name,val,min:u.min,max:u.max,date,by:curUser(),excursion:exc});

function restore(ev){
  const f=ev.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.items||!d.lots||!d.txns) throw new Error(t("invalid_file"));
    confirmAction(t("restore_q"),()=>{ const base=blank(); d.settings=Object.assign(base.settings,d.settings||{}); DB=d; save(); toast(t("ok_imported"),"ok"); go("dashboard"); },t("btn_replace_data"));
  }catch(e){ toast(t("read_fail",{msg:e.message}),"err"); } };
  r.readAsText(f); ev.target.value="";
}

function addUser(){
  if(!isSuperAdmin())return toast(t("u_not_authorized"),"err");
  const u=$("nu-user").value.trim(), p=$("nu-pass").value, role=$("nu-role").value;
  if(!u||!p)return toast(t("u_need"),"err");
  if((DB.settings.users||[]).some(x=>x.u===u))return toast(t("u_exists"),"err");
  const perms=[...document.querySelectorAll(".nu-perm:checked")].map(el=>el.value);
  if(!perms.length)return toast(t("u_perms_need"),"err");
  DB.settings.users.push({u,p,role,perms}); save(); toast(t("u_added"),"ok"); go("users");
}
function setRole(u){
  if(!isSuperAdmin())return toast(t("u_not_authorized"),"err");
  const usr=(DB.settings.users||[]).find(x=>x.u===u); if(!usr||usr.role==="superadmin")return;
  usr.role = usr.role==="admin"?"user":"admin";
  if(u===curUser()&&currentUser) currentUser.role=usr.role;
  save(); toast(t("u_role_changed"),"ok"); go("users");
}
function editPerms(u){
  if(!isSuperAdmin())return toast(t("u_not_authorized"),"err");
  const usr=(DB.settings.users||[]).find(x=>x.u===u); if(!usr||usr.role==="superadmin")return;
  modal(t("u_perms_for",{u:u}),`<div style="display:flex;flex-wrap:wrap;gap:10px">${permChecks("ep-perm",usr.perms||[])}</div>`,
    `<button class="btn" id="ep-save">${t("btn_save")}</button><button class="btn ghost" onclick="App.closeModal()">${t("btn_cancel")}</button>`);
  $("ep-save").onclick=()=>{
    const perms=[...document.querySelectorAll(".ep-perm:checked")].map(el=>el.value);
    if(!perms.length)return toast(t("u_perms_need"),"err");
    usr.perms=perms;
    if(u===curUser()&&currentUser){ currentUser.perms=perms; renderSidebar(); }
    save(); closeModal(); toast(t("u_perms_saved"),"ok"); go("users");
  };
}
function resetUserPass(u){
  if(!isSuperAdmin())return toast(t("u_not_authorized"),"err");
  const usr=(DB.settings.users||[]).find(x=>x.u===u); if(!usr)return;
  modal(t("u_reset_for",{u:u}),`<div class="field"><label>${t("u_new_pass")}</label><input id="rp-pass" type="text"></div>`,
    `<button class="btn" id="rp-save">${t("btn_save")}</button><button class="btn ghost" onclick="App.closeModal()">${t("btn_cancel")}</button>`);
  $("rp-save").onclick=()=>{ const np=$("rp-pass").value; if(!np)return toast(t("u_need"),"err"); usr.p=np; save(); closeModal(); toast(t("u_pass_changed"),"ok"); };

function renameUser(u){
  if(!isSuperAdmin())return toast(t("u_not_authorized"),"err");
  const usr=(DB.settings.users||[]).find(x=>x.u===u); if(!usr)return;
  modal(t("u_rename_for",{u:u}),`<div class="field"><label>${t("u_new_username")}</label><input id="ru-user" value="${esc(u)}"></div>`,
    `<button class="btn" id="ru-save">${t("btn_save")}</button><button class="btn ghost" onclick="App.closeModal()">${t("btn_cancel")}</button>`);
  $("ru-save").onclick=()=>{
    const nu=$("ru-user").value.trim();
    if(!nu)return toast(t("u_need"),"err");

    save(); closeModal(); toast(t("u_username_changed"),"ok"); go("users");
  };
}
function delUser(u){
  if(!isSuperAdmin())return toast(t("u_not_authorized"),"err");

let impRows=[];
pages.import=()=>`
  <div class="page-head"><div><h2>${t("nav_import")}</h2><p>${t("imp_sub")}</p></div></div>
  <div class="panel"><div class="panel-b">

      <input type="file" id="imp-file" accept=".csv,text/csv" style="display:none" onchange="App.importFile(event)">
    </div>
  </div></div>
  <div id="imp-preview"></div>`;
function importTemplate(){
  const csv="\uFEFFcode,name,manufacturer,category,unit,minQty,lot,expiry,qty,supplier,lab,inspection\n"+
    "VIR-1,HIV AG/AB COMBO,Abbott,reagent,test,200,LOT2025A,2027-06-01,500,Main Supplier,virology,accepted\n";
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"}), url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="import-template.csv"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function parseCSV(text){
  text=String(text).replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const rows=[]; let row=[], field="", q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=c; }
    else { if(c==='"') q=true; else if(c===","){ row.push(field); field=""; } else if(c==="\n"){ row.push(field); rows.push(row); row=[]; field=""; } else field+=c; } }
  if(field!==""||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(x=>String(x).trim()!==""));
}
function mapKey(list,val,fb){ if(val==null||val==="")return fb; const s=String(val).trim().toLowerCase(); const o=list.find(x=>String(x.k).toLowerCase()===s||String(x.ar).toLowerCase()===s||String(x.en).toLowerCase()===s); return o?o.k:fb; }
function normDate(s){ s=String(s||"").trim(); if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s; const d=new Date(s); return isNaN(d.getTime())?s:d.toISOString().slice(0,10); }
function importFile(ev){
  const f=ev.target.files&&ev.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const rows=parseCSV(rd.result);
    if(rows.length<2){ impRows=[]; $("imp-preview").innerHTML=`<div class="help-box">${t("imp_none")}</div>`; return; }
    const head=rows[0].map(h=>String(h).replace(/^\uFEFF/,"").trim().toLowerCase());
    const idx=n=>head.indexOf(n);
    if(["code","name","lot","expiry","qty"].some(n=>idx(n)<0)){ impRows=[]; $("imp-preview").innerHTML=`<div class="help-box">${t("imp_cols_missing")}</div>`; return; }
    impRows=[];
    for(let r=1;r<rows.length;r++){ const c=rows[r], g=n=>{ const i=idx(n); return i>=0?String(c[i]||"").trim():""; };
      const code=g("code"),name=g("name"),lot=g("lot"),exp=normDate(g("expiry")),qty=+g("qty");
      if(!code||!name||!lot||!exp||!qty||qty<=0) continue;
      impRows.push({code,name,manufacturer:g("manufacturer"),category:mapKey(CATS,g("category"),"other"),unit:mapKey(UNITS,g("unit"),"test"),minQty:+g("minqty")||0,lot,expiry:exp,qty,supplier:g("supplier"),lab:mapKey(labs(),g("lab"),"store"),inspection:mapKey(INSPECT,g("inspection"),"accepted")});
    }
    ev.target.value="";
    if(!impRows.length){ $("imp-preview").innerHTML=`<div class="help-box">${t("imp_none")}</div>`; return; }
    $("imp-preview").innerHTML=`<div class="panel" style="margin-top:6px"><div class="panel-h"><h3>${t("imp_preview_h",{n:impRows.length})}</h3><button class="btn" onclick="App.importRows()">${t("imp_do",{n:impRows.length})}</button></div><div class="panel-b"><div class="tbl-wrap"><table><thead><tr><th>${t("th_code")}</th><th>${t("th_name")}</th><th>${t("f_lot")}</th><th>${t("th_exp")}</th><th class="num">${t("th_qty")}</th><th>${t("f_lab")}</th><th>${t("f_inspection")}</th></tr></thead><tbody>${impRows.slice(0,80).map(x=>`<tr><td><span class="tag mut mono">${esc(x.code)}</span></td><td>${esc(x.name)}</td><td>${esc(x.lot)}</td><td>${esc(fmtG(x.expiry))}</td><td class="num">${num(x.qty)}</td><td>${esc(labelOf(labs(),x.lab))}</td><td>${x.inspection==="rejected"?`<span class="tag danger">${esc(labelOf(INSPECT,"rejected"))}</span>`:`<span class="tag ok">${esc(labelOf(INSPECT,"accepted"))}</span>`}</td></tr>`).join("")}</tbody></table></div>${impRows.length>80?`<p class="muted" style="font-size:12px">${t("imp_more",{n:impRows.length-80})}</p>`:""}</div></div>`;
  }catch(e){ $("imp-preview").innerHTML=`<div class="help-box">${t("imp_bad")}</div>`; } };
  rd.onerror=()=>{ $("imp-preview").innerHTML=`<div class="help-box">${t("imp_bad")}</div>`; };
  rd.readAsText(f,"utf-8");
}
function importRows(){
  if(!impRows.length)return;
  let n=0;
  impRows.forEach(x=>{ const rejected=x.inspection==="rejected";
    let it=DB.items.find(i=>i.code===x.code);
    if(!it){ it={id:uid(),code:x.code,name:x.name,manufacturer:x.manufacturer,category:x.category,unit:x.unit,minQty:x.minQty,createdAt:new Date().toISOString()}; DB.items.push(it); }
    else { it.name=x.name||it.name; if(x.manufacturer)it.manufacturer=x.manufacturer; }
    let lotRec=!rejected&&DB.lots.find(l=>l.code===x.code&&l.lot===x.lot&&l.expiry===x.expiry&&!isRej(l));
    if(lotRec){ lotRec.qtyReceived+=x.qty; lotRec.qtyRemaining+=x.qty; }
    else { DB.lots.push({id:uid(),code:x.code,lot:x.lot,expiry:x.expiry,qtyReceived:x.qty,qtyRemaining:x.qty,supplier:x.supplier,lab:x.lab,inspection:x.inspection,rejected,receivedAt:todayISO()}); }
    DB.txns.push({id:uid(),type:"in",code:x.code,lot:x.lot,qty:x.qty,date:todayISO(),party:x.supplier||t("party_incoming"),lab:x.lab,inspection:x.inspection,note:"CSV",user:curUser()});
    n++;
  });
  const cnt=n; impRows=[]; save(); toast(t("imp_done",{n:cnt}),"ok"); go("inventory");
}

  if(kind==="inventory"){

    DB.items.forEach(it=>{const active=availLots(it.code);rows.push([it.code,it.name,it.manufacturer||"",labelOf(CATS,it.category),labelOf(UNITS,it.unit),availQtyOf(it.code),it.minQty||0,active.length,t(itemStatus(it).key)]);});
  }else if(kind==="log"){
    name=t("fn_log"); rows.push([t("th_date"),t("th_type"),t("th_code"),t("th_name"),t("th_lot"),t("th_qty"),t("th_lab"),t("th_party"),t("col_inspection"),t("th_user"),t("th_notes")]);
    const tt={in:t("f_in"),out:t("f_out"),adjust:t("f_adjust"),dispose:t("f_dispose")};
    DB.txns.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).forEach(x=>{const it=DB.items.find(i=>i.code===x.code);rows.push([x.date,tt[x.type]||x.type,x.code,it?it.name:"",x.lot||"",((x.type==="out"||x.type==="dispose")?"-":"+")+x.qty,labelOf(labs(),x.lab),x.party||"",x.inspection?labelOf(INSPECT,x.inspection):"",x.user||"",x.note||""]);});

    DB.lots.filter(l=>l.qtyRemaining>0).sort((a,b)=>(a.expiry||"9999").localeCompare(b.expiry||"9999")).forEach(l=>{const it=DB.items.find(i=>i.code===l.code);const st=lotStatus(l);rows.push([it?it.name:"",l.code,l.lot||"",l.expiry||"",l.qtyRemaining,l.expiry?daysTo(l.expiry):"",labelOf(labs(),l.lab),l.inspection?labelOf(INSPECT,l.inspection):"",lotStatusText(st)]);});
  }else if(kind==="consumption"){
    name=t("fn_consumption"); rows.push([t("th_name"),t("th_code"),t("th_total_dispensed")]);
    const m={};DB.txns.filter(x=>x.type==="out").forEach(x=>{m[x.code]=(m[x.code]||0)+(+x.qty||0);});
    Object.entries(m).sort((a,b)=>b[1]-a[1]).forEach(([code,q])=>{const it=DB.items.find(i=>i.code===code);rows.push([it?it.name:code,code,q]);});
  }else if(kind==="labusage"){
    name=t("fn_labusage"); rows.push([t("th_lab"),t("th_total_dispensed")]);
    const m={};DB.txns.filter(x=>x.type==="out").forEach(x=>{const key=x.lab||"—";m[key]=(m[key]||0)+(+x.qty||0);});
    Object.entries(m).sort((a,b)=>b[1]-a[1]).forEach(([k,q])=>rows.push([labelOf(labs(),k),q]));
  }else if(kind==="period"){
    name=t("fn_period")+"_"+repFrom+"_"+repTo+(repEmp?("_"+repEmp):""); rows.push([t("th_name"),t("th_code"),t("rep_received"),t("rep_dispensed")]);
    periodData().forEach(r=>rows.push([r.name,r.code,r.inq,r.outq]));
  }else if(kind==="employee"){
    name=t("fn_employee")+"_"+repFrom+"_"+repTo; rows.push([t("th_employee"),t("rep_ops"),t("rep_received"),t("rep_dispensed"),t("rep_adjust_n")]);
    employeeData().forEach(r=>rows.push([r.user,r.ops,r.inq,r.outq,r.adj]));
  }else if(kind==="disposal"){
    name=t("fn_disposal"); rows.push([t("th_date"),t("th_name"),t("th_code"),t("th_lot"),t("th_exp"),t("th_qty"),t("dispose_reason"),t("dispose_by"),t("th_lab"),t("th_notes")]);
    DB.disposals.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).forEach(d=>rows.push([d.date,d.name||d.code,d.code,d.lot||"",d.expiry||"",d.qty,d.reason||"",d.by||"",labelOf(labs(),d.lab),d.note||""]));
  }else if(kind==="requisition"){
    name=t("fn_requisition"); rows.push([t("th_code"),t("th_name"),t("reorder_th_current"),t("reorder_th_min"),t("reorder_th_suggest"),t("th_unit"),t("reorder_status"),t("reorder_th_last")]);
    reorderList().forEach(r=>{const st=r.tier==="expiry"?(t("reorder_expiry")+" "+fmtG(r.soonest)):t({out:"reorder_out",below:"reorder_below",near:"reorder_near"}[r.tier]);rows.push([r.it.code,r.it.name,r.q,r.m,r.suggest,labelOf(UNITS,r.it.unit),st,r.supplier||""]);});
  }else if(kind==="recall"){
    name=t("fn_recall"); rows.push([t("th_date"),t("th_name"),t("th_code"),t("th_lot"),t("recall_reason"),t("recall_ref"),t("recall_by"),t("trace_sum_rem"),t("trace_sum_disp")]);
    (DB.recalls||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).forEach(r=>rows.push([r.date,r.name||r.code,r.code,r.lot||"",r.reason||"",r.ref||"",r.by||"",r.heldQty,r.dispatchedQty]));
  }else if(kind==="temp"){
    name=t("fn_temp"); rows.push([t("temp_date"),t("temp_unit"),t("temp_reading"),t("temp_min"),t("temp_max"),t("temp_by"),t("th_status")]);
    (DB.tempLogs||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).forEach(g=>rows.push([g.date,g.unitName||"",g.val,g.min,g.max,g.by||"",(g.val<g.min||g.val>g.max)?t("temp_excursion"):t("temp_in_range")]));
  }
  if(rows.length<=1)return toast(t("no_export_data"),"err");
  const csv="\uFEFF"+rows.map(r=>r.map(c=>{c=String(c==null?"":c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(",")).join("\r\n");
  download(new Blob([csv],{type:"text/csv;charset=utf-8"}),`${name}_${todayISO()}.csv`);
  toast(t("ok_exported"),"ok");
}
function download(blob,filename){
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500);
}

/* Seed sample data (first run) */
function seedFirstRun(db,force){
  if(db.settings.seeded&&!force) return db;
  db.settings.seeded=true; return db; /* sample data disabled — start with empty inventory */
  const today=new Date(); const iso=d=>d.toISOString().slice(0,10);
  const addDays=n=>{const d=new Date(today);d.setDate(d.getDate()+n);return iso(d);};
  const items=[
    {code:"NS-09",name:"محلول ملحي 0.9%",manufacturer:"SPIMACO",category:"iv",unit:"bag",minQty:40},
    {code:"D5W",name:"محلول دكستروز 5%",manufacturer:"Fresenius Kabi",category:"iv",unit:"bag",minQty:30},
    {code:"RL",name:"رينجر لاكتات",manufacturer:"Baxter",category:"iv",unit:"bag",minQty:25},
    {code:"CPDA-1",name:"محلول CPDA-1 حافظ للدم",manufacturer:"Macopharma",category:"preservative",unit:"bag",minQty:50},
    {code:"SAGM",name:"محلول SAGM المضاف",manufacturer:"Terumo",category:"preservative",unit:"bag",minQty:50},
    {code:"NACIT-32",name:"سيترات الصوديوم 3.2%",manufacturer:"Greiner",category:"anticoag",unit:"bottle",minQty:20},
    {code:"CHX-2",name:"كلورهيكسيدين 2% مطهر",manufacturer:"BD",category:"antiseptic",unit:"bottle",minQty:15},
  ];
  items.forEach(it=>db.items.push(Object.assign({id:uid(),createdAt:new Date().toISOString()},it)));
  // [code, lot, expiry, qty, lab, rejected]
  const lots=[
    ["NS-09","L23110",addDays(-12),60,"store",false],
    ["NS-09","L24050",addDays(40),120,"store",false],
    ["NS-09","L24120",addDays(420),200,"store",false],
    ["D5W","L24033",addDays(25),35,"store",false],
    ["D5W","LREJ01",addDays(150),40,"store",true],
    ["D5W","L24210",addDays(500),90,"store",false],
    ["RL","L24007",addDays(15),18,"store",false],
    ["CPDA-1","L24A1",addDays(300),140,"bloodbank",false],
    ["CPDA-1","L23X9",addDays(-5),20,"bloodbank",false],
    ["SAGM","L24S2",addDays(220),130,"components",false],
    ["NACIT-32","L24N1",addDays(95),60,"serology",false],
    ["CHX-2","L24C1",addDays(380),22,"store",false],
  ];
  lots.forEach(([code,lot,exp,q,lab,rej])=>{
    db.lots.push({id:uid(),code,lot,expiry:exp,qtyReceived:q,qtyRemaining:q,supplier:"المستودع المركزي",lab,inspection:rej?"rejected":"accepted",rejected:rej,receivedAt:addDays(-30)});
    db.txns.push({id:uid(),type:"in",code,lot,qty:q,date:addDays(-30),party:"المستودع المركزي",lab,inspection:rej?"rejected":"accepted",note:"رصيد افتتاحي",user:"admin"});
  });
  // dispenses to populate consumption + lab usage
  const outs=[["NS-09",40,"components",-9],["NS-09",30,"bloodbank",-6],["D5W",20,"hematology",-5],["RL",10,"biochem",-3],["CPDA-1",35,"bloodbank",-2],["SAGM",25,"components",-1],["NS-09",18,"serology",-1]];
  outs.forEach(([code,q,lab,dago])=>{
    let rem=q; const used=[]; for(const l of db.lots.filter(x=>x.code===code&&x.qtyRemaining>0&&!x.rejected).sort((a,b)=>(a.expiry||"9").localeCompare(b.expiry||"9"))){if(rem<=0)break;const tk=Math.min(rem,l.qtyRemaining);l.qtyRemaining-=tk;rem-=tk;used.push(l.lot);}
    db.txns.push({id:uid(),type:"out",code,lot:used.join(", "),qty:q,date:addDays(dago),party:(DEFAULT_LABS.find(x=>x.k===lab)||{}).ar||lab,lab,note:"صرف",user:"admin"});
  });
  db.settings.seeded=true;
  return db;
}

const SYNC_KEY="inv_sync_cfg";
var fbApp=null, fbDoc=null, fbUnsub=null, syncState="off", applyingRemote=false, pushTimer=null;
const SYNC_PIN="121985";
let syncUnlocked=false;
const BUILTIN_SYNC={workspace:"bloodbank-dammam",config:{apiKey:"AIzaSyBLs1q9ryZZYI5Br9yBi7sSXk-92HVklRI",authDomain:"bloodbank-dammam.firebaseapp.com",projectId:"bloodbank-dammam",storageBucket:"bloodbank-dammam.firebasestorage.app",messagingSenderId:"165465917721",appId:"1:165465917721:web:2989e02513f51e6c101d88"}};
function getSyncCfg(){ try{ const ls=JSON.parse(localStorage.getItem(SYNC_KEY)||"null"); if(ls&&ls.config&&ls.config.projectId&&ls.workspace) return ls; }catch(e){} return (BUILTIN_SYNC&&BUILTIN_SYNC.config&&BUILTIN_SYNC.config.projectId&&BUILTIN_SYNC.workspace)?BUILTIN_SYNC:null; }
function setSyncStatus(s){ syncState=s; const el=$("syncBadge"); if(!el)return;
  const cls={off:"mut",connecting:"info",live:"ok",error:"danger",offline:"warn"};
  const key={off:"sync_off",connecting:"sync_connecting",live:"sync_live",error:"sync_error",offline:"sync_offline"};
  el.className="tag "+(cls[s]||"mut"); el.textContent=t(key[s]||"sync_off"); }
function loadJS(src){ return new Promise((res,rej)=>{ if([...document.scripts].some(x=>x.src===src)){res();return;}
  const sc=document.createElement("script"); sc.src=src; sc.onload=()=>res(); sc.onerror=()=>rej(new Error("load")); document.head.appendChild(sc); }); }
async function ensureFB(){ if(window.firebase&&window.firebase.firestore)return;
  await loadJS("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
  await loadJS("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"); }
function parseCfg(txt){ try{return JSON.parse(txt);}catch(e){} try{return (new Function("return ("+txt+")"))();}catch(e){return null;} }
function adoptRemote(data){ applyingRemote=true; try{ DB=normalize(data); localStorage.setItem(KEY,JSON.stringify(DB));
  if($("app").style.display==="block") go(location.hash.replace("#","")||"dashboard"); }finally{ applyingRemote=false; } }
function pushNow(){ if(!fbDoc)return Promise.resolve(); return fbDoc.set({data:DB,updatedAt:Date.now(),by:curUser()}); }
function schedulePush(){ if(!fbDoc||applyingRemote)return; clearTimeout(pushTimer); pushTimer=setTimeout(()=>{ pushNow().catch(e=>console.error("push",e)); },600); }
async function startSync(){
  const cfg=getSyncCfg(); if(!cfg||!cfg.config||!cfg.workspace){ setSyncStatus("off"); return; }
  setSyncStatus("connecting");
  try{
    await ensureFB();
    if(!fbApp){ fbApp = (window.firebase.apps&&window.firebase.apps.length) ? window.firebase.app() : window.firebase.initializeApp(cfg.config); }
    const fs=window.firebase.firestore();
    fbDoc=fs.collection("inventory_sync").doc(cfg.workspace);
    const snap=await fbDoc.get();
    if(snap.exists && snap.data() && snap.data().data){ adoptRemote(snap.data().data); }
    else { await pushNow(); }
    if(fbUnsub)fbUnsub();
    fbUnsub=fbDoc.onSnapshot(s=>{ if(s.metadata.hasPendingWrites)return; const d=s.data(); if(d&&d.data) adoptRemote(d.data); },
      e=>{ console.error("snap",e); setSyncStatus("error"); });
    setSyncStatus("live");
  }catch(e){ console.error("sync",e); setSyncStatus("error"); }
}
function connectSync(){
  const ws=$("sy-ws").value.trim(), cfgTxt=$("sy-cfg").value.trim();
  if(!ws||!cfgTxt)return toast(t("sync_need"),"err");
  const cfg=parseCfg(cfgTxt); if(!cfg||!cfg.projectId)return toast(t("sync_bad_cfg"),"err");
  localStorage.setItem(SYNC_KEY,JSON.stringify({workspace:ws,config:cfg}));
  toast(t("sync_connected"),"ok"); startSync();
}
function disconnectSync(){ if(fbUnsub){fbUnsub();fbUnsub=null;} fbDoc=null; localStorage.removeItem(SYNC_KEY); setSyncStatus("off"); toast(t("sync_disconnected"),"ok"); }
function unlockSync(){
  modal(t("sync_pin_title"),`<div class="field"><label>${t("sync_pin_lbl")}</label><input id="sync-pin" type="password" inputmode="numeric" autocomplete="off"></div>`,
    `<button class="btn" id="sync-pin-ok">${t("btn_confirm")}</button><button class="btn ghost" onclick="App.closeModal()">${t("btn_cancel")}</button>`);
  setTimeout(()=>{ const i=$("sync-pin"); if(i)i.focus(); },50);
  $("sync-pin-ok").onclick=()=>{ if(($("sync-pin").value||"")===SYNC_PIN){ syncUnlocked=true; closeModal(); toast(t("sync_unlocked"),"ok"); go("settings"); } else { toast(t("sync_pin_wrong"),"err"); } };
}
